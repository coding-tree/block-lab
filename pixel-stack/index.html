<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelStack — Bloki do gier 2D</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090f; --bg2: #0f0f1a; --bg3: #16162a; --bg4: #1e1e36;
  --border: #2a2a4a; --border2: #3a3a6a;
  --text: #e8e8f0; --muted: #6060a0;
  --green: #00ff88; --blue: #4488ff; --purple: #bb66ff;
  --red: #ff4466; --orange: #ffaa00; --cyan: #00ddff; --yellow: #ffd93d;
  --pink: #ff55ff;
  --font: 'Outfit', sans-serif; --mono: 'DM Mono', monospace;
  --r: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

.topbar { height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
.topbar .logo { font-weight: 900; font-size: 18px; letter-spacing: -.5px; }
.topbar .logo span { color: var(--pink); }
.topbar .logo em { font-style: normal; color: var(--cyan); }
.topbar .spacer { flex: 1; }
.topbar .badge { font-family: var(--mono); font-size: 10px; color: var(--muted); }

.main { height: calc(100% - 48px); display: flex; position: relative; }
.view { display: none; width: 100%; height: 100%; }
.view.active { display: flex; }

#tree-view { flex-direction: column; align-items: center; overflow-y: auto; padding: 40px 20px 80px; }
.tree-track-label {
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
  padding: 6px 16px; border-radius: 20px; margin: 30px 0 16px;
}
.tree-track-label.green { color: var(--green); background: #00ff8815; }
.tree-track-label.blue { color: var(--blue); background: #4488ff15; }
.tree-connector { width: 2px; height: 28px; background: var(--border); }
.tree-node {
  width: 200px; padding: 16px; border-radius: var(--r); border: 2px solid var(--border);
  background: var(--bg2); text-align: center; cursor: pointer; transition: all .2s;
  position: relative;
}
.tree-node:hover { border-color: var(--border2); transform: translateY(-2px); }
.tree-node.locked { opacity: .4; cursor: default; filter: grayscale(.6); }
.tree-node.locked:hover { transform: none; border-color: var(--border); }
.tree-node.available { border-color: var(--border2); animation: pulse-border 2s ease-in-out infinite; }
.tree-node.complete .node-icon { filter: none; }
.tree-node .node-icon { font-size: 28px; margin-bottom: 6px; }
.tree-node .node-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.tree-node .node-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.tree-node .node-stars { margin-top: 8px; font-size: 11px; color: var(--muted); letter-spacing: 2px; }
@keyframes pulse-border { 0%,100% { box-shadow: 0 0 0 0 transparent; } 50% { box-shadow: 0 0 16px -4px var(--border2); } }

.tree-node.t-green { border-color: #00ff8833; }
.tree-node.t-green.available { border-color: var(--green); box-shadow: 0 0 20px -6px var(--green); }
.tree-node.t-green.complete { border-color: var(--green); background: #00ff8808; }
.tree-node.t-blue { border-color: #4488ff33; }
.tree-node.t-blue.available { border-color: var(--blue); box-shadow: 0 0 20px -6px var(--blue); }
.tree-node.t-blue.complete { border-color: var(--blue); background: #4488ff08; }

#browser-view { flex-direction: column; padding: 24px 32px; overflow-y: auto; }
.browser-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.browser-header .back {
  padding: 6px 12px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); border-radius: 8px; cursor: pointer; font-family: var(--font);
}
.browser-header .back:hover { color: var(--text); border-color: var(--border2); }
.browser-header h2 { font-weight: 800; font-size: 20px; }
.challenge-item {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 10px; cursor: pointer; transition: all .15s;
}
.challenge-item:hover { border-color: var(--border2); transform: translateX(4px); }
.challenge-item .ci-num { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 24px; }
.challenge-item .ci-title { flex: 1; font-weight: 600; font-size: 13px; }
.challenge-item .ci-stars { font-size: 14px; letter-spacing: 1px; }

#challenge-view { flex-direction: column; }
#sandbox-view { flex-direction: column; }
.ch-topbar {
  display: flex; align-items: center; gap: 16px; padding: 12px 20px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
}
.ch-topbar .back {
  padding: 6px 12px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); border-radius: 8px; cursor: pointer; font-family: var(--font);
}
.ch-topbar .back:hover { color: var(--text); border-color: var(--border2); }
.ch-topbar .ch-title { font-weight: 700; flex: 1; }
.ch-topbar .ch-stars { font-size: 18px; letter-spacing: 2px; }
.ch-body { flex: 1; display: flex; overflow: hidden; }
.ch-col { padding: 16px; overflow-y: auto; }
.palette { width: 220px; border-right: 1px solid var(--border); background: var(--bg2); }
.ch-main { flex: 1; display: flex; flex-direction: column; gap: 12px; align-items: center; }
.script-area {
  width: 100%; max-width: 520px; min-height: 160px;
  background: var(--bg2); border: 1px dashed var(--border); border-radius: var(--r); padding: 12px;
}
#scene { background: #000; image-rendering: pixelated; border: 1px solid var(--border); border-radius: 8px; }
.ch-controls { display: flex; gap: 10px; }
.ch-controls button {
  padding: 8px 16px; border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text); border-radius: 8px; cursor: pointer; font-family: var(--font); font-weight: 600;
}
.ch-controls button:hover { background: var(--bg4); }
.ch-side { width: 280px; border-left: 1px solid var(--border); background: var(--bg2); }
.ch-goal {
  font-size: 13px; color: var(--muted); line-height: 1.5;
  margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.ch-tests div { display: flex; gap: 8px; align-items: center; padding: 6px 0; font-size: 12px; }
.ch-tests .t-pass { color: var(--green); }
.ch-tests .t-fail { color: var(--red); }
.ch-tests .t-pending { color: var(--muted); }
.ch-msg { margin-top: 12px; font-weight: 600; font-size: 13px; }
.ch-msg.success { color: var(--green); }
.ch-msg.fail { color: var(--red); }

.palette-cat { margin-bottom: 14px; }
.palette-cat-label { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.palette-block { padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: var(--mono); color: var(--text); cursor: grab; margin-bottom: 4px; user-select: none; }
.palette-block.b-draw   { background: #ff55ff22; border: 1px solid #ff55ff55; }
.palette-block.b-loop   { background: #00ff8822; border: 1px solid #00ff8855; }
.palette-block.b-state  { background: #4488ff22; border: 1px solid #4488ff55; }
.palette-block.b-math   { background: #ffaa0022; border: 1px solid #ffaa0055; }
.palette-block.b-motion { background: #00ddff22; border: 1px solid #00ddff55; }
.hole { display: inline-block; min-width: 28px; padding: 0 6px; background: var(--bg4); border: 1px dashed var(--border2); border-radius: 4px; color: var(--muted); }
.nested { display: inline-block; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 11px; }
.nested.b-draw   { background: #ff55ff33; }
.nested.b-loop   { background: #00ff8833; }
.nested.b-state  { background: #4488ff33; }
.nested.b-math   { background: #ffaa0033; }
.nested.b-motion { background: #00ddff33; }

.sb-btn {
  padding: 4px 10px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); border-radius: 6px; cursor: pointer; font-family: var(--font);
  font-size: 12px;
}
.sb-btn:hover { color: var(--text); border-color: var(--border2); }
.sb-sprite-list { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.sb-sprite-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px;
  cursor: pointer; font-size: 12px; color: var(--muted); margin-bottom: 4px;
}
.sb-sprite-item:hover { color: var(--text); background: var(--bg3); }
.sb-sprite-item.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.sb-sprite-color { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
.sb-sprite-name { flex: 1; }
#sb-scene { background: #000; image-rendering: pixelated; border: 1px solid var(--border); border-radius: 8px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><span>Pixel</span><em>Stack</em></div>
  <div class="spacer"></div>
  <div class="badge" id="stars-badge">⭐ 0 / 0</div>
</div>
<div class="main">
  <div id="tree-view" class="view active"><div id="tree-root"></div></div>
  <div id="challenge-view" class="view">
    <div class="ch-topbar">
      <button class="back" onclick="ps.backToStage()">← wyzwania</button>
      <span class="ch-title" id="ch-title"></span>
      <span class="ch-stars" id="ch-stars">☆☆☆</span>
    </div>
    <div class="ch-body">
      <aside id="palette" class="ch-col palette"></aside>
      <section class="ch-col ch-main">
        <div id="script-area" class="script-area"></div>
        <canvas id="scene" width="512" height="320"></canvas>
        <div class="ch-controls">
          <button id="btn-run">▶ Uruchom</button>
          <button id="btn-reset">🔄 Reset</button>
          <button id="btn-check">✓ Sprawdź</button>
        </div>
      </section>
      <aside class="ch-col ch-side">
        <div id="ch-goal" class="ch-goal"></div>
        <div id="ch-tests" class="ch-tests"></div>
        <div id="ch-msg" class="ch-msg"></div>
      </aside>
    </div>
  </div>
  <div id="sandbox-view" class="view">
    <div class="ch-topbar">
      <button class="back" onclick="ps.backToTree()">← drzewo</button>
      <span class="ch-title">Sandbox</span>
      <button id="sb-add" class="sb-btn">+ sprite</button>
      <button id="sb-del" class="sb-btn">− usuń</button>
    </div>
    <div class="ch-body">
      <aside class="ch-col palette">
        <div id="sb-sprite-list" class="sb-sprite-list"></div>
        <div id="sb-palette"></div>
      </aside>
      <section class="ch-col ch-main">
        <div id="sb-script-area" class="script-area"></div>
        <canvas id="sb-scene" width="512" height="320"></canvas>
        <div class="ch-controls">
          <button id="sb-run">▶</button>
          <button id="sb-pause">⏸</button>
          <button id="sb-step">⏭</button>
          <button id="sb-reset">🔄</button>
        </div>
      </section>
    </div>
  </div>
  <div id="browser-view" class="view"></div>
</div>
<script>
const STAGES = [
  { id: 'pixels',   track: 'basics', title: 'Pixels',   icon: '🎨', desc: 'x/y, rozmiar, kolor',           requires: [],           unlockedCats: ['draw'] },
  { id: 'tick',     track: 'basics', title: 'Tick',     icon: '🕐', desc: 'game loop, co klatkę',          requires: ['pixels'],   unlockedCats: ['draw','loop','state','math'] },
  { id: 'autonomy', track: 'actors', title: 'Autonomy', icon: '🧠', desc: 'każdy sprite własna pętla',     requires: ['tick'],     unlockedCats: ['draw','loop','state','math'] },
  { id: 'motion',   track: 'actors', title: 'Motion',   icon: '➡️', desc: 'prędkość, grawitacja',          requires: ['autonomy'], unlockedCats: ['draw','loop','state','math','motion'] },
];

const TRACKS = {
  basics: { label: 'Basics', color: 'green' },
  actors: { label: 'Actors', color: 'blue' },
};

const BLOCKS = {
  'set-pos':     { cat: 'draw',   type: 'statement',  label: 'postaw w (x: §x, y: §y)',     slots: { x: { type: 'number', default: 100 }, y: { type: 'number', default: 80 } } },
  'set-size':    { cat: 'draw',   type: 'statement',  label: 'rozmiar (w: §w, h: §h)',      slots: { w: { type: 'number', default: 16 }, h: { type: 'number', default: 16 } } },
  'set-color':   { cat: 'draw',   type: 'statement',  label: 'kolor §c',                     slots: { c: { type: 'color',  default: '#00ff88' } } },
  'on-start':    { cat: 'loop',   type: 'trigger',    label: '🟢 na start' },
  'on-tick':     { cat: 'loop',   type: 'trigger',    label: '🕐 co tick' },
  'set-state':   { cat: 'state',  type: 'statement',  label: 'stan.§field = §val',           slots: { field: { type: 'ident', default: 'x' }, val: { type: 'expression', default: 0 } } },
  'get-state':   { cat: 'state',  type: 'expression', label: 'stan.§field',                  slots: { field: { type: 'ident', default: 'x' } } },
  'set-global':  { cat: 'state',  type: 'statement',  label: 'globalne.§field = §val',       slots: { field: { type: 'ident', default: 'score' }, val: { type: 'expression', default: 0 } } },
  'num':         { cat: 'math',   type: 'expression', label: '§n',                            slots: { n: { type: 'number', default: 0 } } },
  'op':          { cat: 'math',   type: 'expression', label: '(§a §op §b)',                  slots: { a: { type: 'expression', default: 0 }, op: { type: 'choice', options: ['+','-','*','/','%'], default: '+' }, b: { type: 'expression', default: 0 } } },
  'my-x':        { cat: 'math',   type: 'expression', label: 'moje.x' },
  'my-y':        { cat: 'math',   type: 'expression', label: 'moje.y' },
  'random':      { cat: 'math',   type: 'expression', label: 'losowe (§min..§max)',          slots: { min: { type: 'expression', default: 0 }, max: { type: 'expression', default: 100 } } },
  'move-by':     { cat: 'motion', type: 'statement',  label: 'przesuń o (§dx, §dy)',         slots: { dx: { type: 'expression', default: 1 }, dy: { type: 'expression', default: 0 } } },
  'set-vel':     { cat: 'motion', type: 'statement',  label: 'ustaw prędkość (§vx, §vy)',    slots: { vx: { type: 'expression', default: 0 }, vy: { type: 'expression', default: 0 } } },
  'set-gravity': { cat: 'motion', type: 'statement',  label: 'grawitacja (§gx, §gy)',        slots: { gx: { type: 'expression', default: 0 }, gy: { type: 'expression', default: 0.2 } } },
};

const CATEGORIES = {
  draw:   { label: 'Rysowanie', color: 'pink' },
  loop:   { label: 'Pętla',     color: 'green' },
  state:  { label: 'Stan',      color: 'blue' },
  math:   { label: 'Math',      color: 'orange' },
  motion: { label: 'Ruch',      color: 'cyan' },
};

const CHALLENGES = {
  pixels:   [],
  tick:     [],
  autonomy: [],
  motion:   [],
};

CHALLENGES.tick = [
  {
    title: 'Porusz się w prawo',
    type: 'fill-in-blank',
    goal: 'Kulka ma sunąć w prawo o 1 piksel co klatkę. Użyj on-tick + move-by.',
    initialSprites: [{ color: '#00ff88' }],
    initialScript: [
      { id: 'on-start', body: [{ id: 'set-pos', slots: { x: 0, y: 80 } }] },
      { id: 'on-tick',  body: [{ id: 'move-by', slots: { dx: null, dy: null } }] }
    ],
    tests: [
      { t: 30, label: 'po 30 tickach x≈30', assert: 'Math.abs(s.x - 30) < 1.5' },
      { t: 30, label: 'y bez zmian',        assert: 's.y === 80' }
    ]
  },
  {
    title: 'Licznik w stanie',
    type: 'fill-in-blank',
    goal: 'Co klatkę zwiększ stan.n o 1. Po 100 klatkach ma być 100. Upuść wyrażenie (stan.n + 1) w dziurę.',
    initialSprites: [{ color: '#bb66ff' }],
    initialScript: [
      { id: 'on-start', body: [{ id: 'set-state', slots: { field: 'n', val: 0 } }] },
      { id: 'on-tick',  body: [{ id: 'set-state', slots: { field: 'n', val: null } }] }
    ],
    tests: [{ t: 100, label: 'stan.n === 100', assert: 's.state.n === 100' }]
  },
  {
    title: 'Start raz, tick stale',
    type: 'fill-in-blank',
    goal: 'Ustaw pozycję (200, 160) raz na starcie, a kolor losowo co klatkę. Użyj losowe(0..255) × 3 dla kolorów (tu wystarczy jakikolwiek kolor).',
    initialSprites: [{ color: '#ffffff' }],
    initialScript: [
      { id: 'on-start', body: [{ id: 'set-pos', slots: { x: null, y: null } }] },
      { id: 'on-tick',  body: [{ id: 'set-color', slots: { c: null } }] }
    ],
    tests: [
      { t: 1, label: 'pozycja po tick 1',       assert: 's.x === 200 && s.y === 160' },
      { t: 5, label: 'pozycja nadal taka sama', assert: 's.x === 200 && s.y === 160' }
    ]
  },
  {
    title: 'Pozycja rośnie od czasu',
    type: 'fill-in-blank',
    goal: 'Co klatkę zwiększ stan.t o 1, i ustaw x = stan.t × 2. Upuść wyrażenia w dziury.',
    initialSprites: [{ color: '#00ddff' }],
    initialScript: [
      { id: 'on-start', body: [{ id: 'set-state', slots: { field: 't', val: 0 } }] },
      { id: 'on-tick',  body: [
        { id: 'set-state', slots: { field: 't', val: null } },
        { id: 'set-pos',   slots: { x: null, y: 100 } }
      ]}
    ],
    tests: [
      { t: 50, label: 'stan.t=50', assert: 's.state.t === 50' },
      { t: 50, label: 'x=100',     assert: 's.x === 100' }
    ]
  }
];

CHALLENGES.motion = [
  {
    title: 'Stała prędkość',
    type: 'tests',
    goal: 'Ustaw prędkość (2, 0) raz na starcie. Silnik dalej rusza sprite\'em automatycznie.',
    initialSprites: [{ name: 's', color: '#00ff88', x: 0, y: 100, playerEdited: true }],
    tests: [
      { t: 60, label: 'x≈120', assert: 'Math.abs(s.x - 120) < 3' },
      { t: 60, label: 'y=100', assert: 's.y === 100' }
    ]
  },
  {
    title: 'Grawitacja w dół',
    type: 'tests',
    goal: 'Ustaw grawitację (0, 0.2) na starcie. Sprite ma spadać coraz szybciej.',
    initialSprites: [{ name: 's', color: '#ffaa00', x: 256, y: 0, playerEdited: true }],
    tests: [
      { t: 30,  label: 'spada',              assert: 's.y > 30' },
      { t: 60,  label: 'dalej spada',        assert: 's.y > 150' },
      { t: 60,  label: 'przyspiesza (vy>5)', assert: 's.vy > 5' }
    ]
  },
  {
    title: 'Pocisk w łuku',
    type: 'tests',
    goal: 'Wystrzel sprite\'a z prędkością (3, -4) i grawitacją (0, 0.2). Ma lądować w x > 180.',
    initialSprites: [{ name: 's', color: '#ff55ff', x: 50, y: 280, playerEdited: true }],
    tests: [
      { t: 100, label: 'x > 180',  assert: 's.x > 180' },
      { t: 20,  label: 'w górze',  assert: 's.y < 260' }
    ]
  },
  {
    title: 'Sprite leci po skosie',
    type: 'tests',
    goal: 'Ustaw stałą prędkość (1, 1) (po skosie w dół-prawo) i grawitację (0, 0). Po 100 tickach ma dotrzeć do (150, 150) startując z (50, 50).',
    initialSprites: [{ name: 's', color: '#00ddff', x: 50, y: 50, playerEdited: true }],
    tests: [
      { t: 100, label: 'x≈150', assert: 'Math.abs(s.x - 150) < 3' },
      { t: 100, label: 'y≈150', assert: 'Math.abs(s.y - 150) < 3' }
    ]
  }
];

CHALLENGES.autonomy = [
  {
    title: 'Dwa kwadraty, każdy w swoją stronę',
    type: 'tests',
    goal: 'Na scenie są 2 sprite\'y: "L" i "R". "L" porusza się sam. Zaprogramuj edytowanego sprite\'a "R" tak, żeby szedł w prawo.',
    initialSprites: [
      { name: 'L', color: '#4488ff', x: 256, y: 100, script: [
        { id: 'on-start', body: [] },
        { id: 'on-tick',  body: [{ id: 'move-by', slots: { dx: -1, dy: 0 } }] }
      ]},
      { name: 'R', color: '#ff55ff', x: 256, y: 200, playerEdited: true }
    ],
    tests: [
      { t: 30, label: 'R w prawo (x > 280)', assert: 'sprites[1].x > 280' },
      { t: 30, label: 'L nadal w lewo',      assert: 'sprites[0].x < 230' }
    ]
  },
  {
    title: 'Skocz do lewego górnego rogu',
    type: 'tests',
    goal: 'Edytowany sprite startuje w (400, 250). Napisz kod tak, żeby po jakimś czasie ustawił stan.done = 1 (użyj on-tick + set-state; wystarczy ustawić od razu, aby spełnić test).',
    initialSprites: [{ name: 'me', color: '#00ff88', x: 400, y: 250, playerEdited: true }],
    tests: [{ t: 60, label: 'stan.done=1', assert: 'sprites[0].state.done === 1' }]
  },
  {
    title: 'Dwa sprite\'y, różne kolory',
    type: 'tests',
    goal: 'Sprite "A" od razu zmienia kolor na zielony. Zaprogramuj sprite\'a "B" tak, aby miał inny kolor niż startowy niebieski po 90 klatkach (wystarczy on-tick z set-color).',
    initialSprites: [
      { name: 'A', color: '#ff55ff', script: [
        { id: 'on-tick', body: [{ id: 'set-color', slots: { c: '#00ff88' } }] }
      ]},

function progress() {

function emptyScript() { return []; }

function appendLabelParts(parent, def, slots, opts, ownerNode) {
  const pattern = def.label;
  let cursor = 0;
  const re = /§(\w+)/g;
  let match;
  while ((match = re.exec(pattern)) !== null) {
    const before = pattern.slice(cursor, match.index);
    if (before) parent.appendChild(document.createTextNode(before));
    const key = match[1];
    const val = slots && key in slots ? slots[key] : def.slots?.[key]?.default ?? '';
    const slotEl = document.createElement('span');
    slotEl.className = 'slot';
    slotEl.dataset.slot = key;
    slotEl.__node = ownerNode; // every slot knows its owning node
    const locked = opts.lockLiterals && val !== null && val !== undefined && !(typeof val === 'object');
    if (locked) slotEl.dataset.locked = '1';
    appendSlotContent(slotEl, val, opts);
    parent.appendChild(slotEl);
    cursor = re.lastIndex;
  }
  const rest = pattern.slice(cursor);
  if (rest) parent.appendChild(document.createTextNode(rest));
}

function appendSlotContent(parent, val, opts) {
  if (val === null || val === undefined) {
    const hole = document.createElement('span');
    hole.className = 'hole';
    hole.textContent = '?';
    parent.appendChild(hole);
    return;
  }
  if (val && typeof val === 'object' && val.id) {
    const def = BLOCKS[val.id];
    if (!def) { parent.appendChild(document.createTextNode('?')); return; }
    const nestedEl = document.createElement('span');
    nestedEl.className = `nested b-${def.cat}`;
    const nestedOpts = { ...opts, lockLiterals: false };
    appendLabelParts(nestedEl, def, val.slots || {}, nestedOpts, val);
    parent.appendChild(nestedEl);
    return;
  }
  parent.appendChild(document.createTextNode(String(val)));
}

function renderBlockEl(node, def, opts) {
  const bl = document.createElement('div');
  bl.className = `palette-block b-${def.cat}`;
  bl.__node = node;
  appendLabelParts(bl, def, node.slots || {}, opts, node);
  return bl;
}

function currentChallenge() {
  if (!STATE.stage || STATE.challenge == null) return null;
  return (CHALLENGES[STATE.stage] || [])[STATE.challenge] || null;
}
function isFillInMode() {
  const ch = currentChallenge();
  return !!(ch && ch.type === 'fill-in-blank');
}

function renderScript() {
  const el = document.getElementById('script-area');
  el.innerHTML = '';
  STATE.script = STATE.script || emptyScript();
  const opts = { lockLiterals: isFillInMode() };
  STATE.script.forEach((trig, ti) => {
    const def = BLOCKS[trig.id];
    if (!def) return;
    el.appendChild(renderBlockEl(trig, def, opts));
    const body = document.createElement('div');
    body.className = 'script-body';
    body.dataset.role = 'body';
    body.dataset.triggerIdx = ti;
    body.style.cssText = 'margin-left:20px;border-left:2px solid var(--border);padding-left:10px;margin-bottom:8px;';
    (trig.body || []).forEach((n) => {
      const def2 = BLOCKS[n.id];

}

function openChallenge(stageId, idx) {

function makeDefaultSlots(def) {
  const out = {};
  Object.entries(def.slots || {}).forEach(([k, s]) => { out[k] = s.default; });
  return out;
}

document.addEventListener('dragstart', e => {
  const t = e.target.closest && e.target.closest('.palette-block');
  if (!t || !t.dataset.blockId) return;
  // only palette items carry dataset.blockId set by renderPalette / renderSandboxPalette
  if (!(t.closest('#palette') || t.closest('#sb-palette'))) return;
  e.dataTransfer.setData('text/block-id', t.dataset.blockId);
  e.dataTransfer.effectAllowed = 'copy';
});

function getActiveScriptContext(e) {
  const root = e.target.closest && e.target.closest('#script-area, #sb-script-area');
  if (!root) return null;
  if (root.id === 'script-area') return { root, scriptOwner: 'challenge' };
  if (root.id === 'sb-script-area') return { root, scriptOwner: 'sandbox' };
  return null;
}
function getActiveScript(ownerKey) {
  if (ownerKey === 'challenge') return STATE.script;
  if (ownerKey === 'sandbox') {
    const sp = SB.sprites[SB.activeIdx];
    if (!sp) return null;
    if (!sp.script) sp.script = [];
    return sp.script;
  }
  return null;
}
function rerenderScript(ownerKey) {
  if (ownerKey === 'challenge') { renderScript(); saveCurrentScript(); }
  else if (ownerKey === 'sandbox') renderSandboxScript();
}
function isFillInForContext(ownerKey) {
  return ownerKey === 'challenge' && isFillInMode();
}

document.body.addEventListener('dragover', e => {
  if (!getActiveScriptContext(e)) return;
  if (e.dataTransfer.types.includes('text/block-id')) e.preventDefault();
});
document.body.addEventListener('drop', e => {
  const ctx = getActiveScriptContext(e); if (!ctx) return;
  e.preventDefault();
  const id = e.dataTransfer.getData('text/block-id');
  const def = BLOCKS[id]; if (!def) return;
  const script = getActiveScript(ctx.scriptOwner);
  if (!script && ctx.scriptOwner === 'sandbox') return;

  // Expression → expression slot (works in both fill-in-blank and normal modes)
  if (def.type === 'expression') {
    const slot = e.target.closest('.slot');
    if (!slot) return;
    if (slot.dataset.locked === '1') return;
    const node = slot.__node;
    if (!node) return;
    const slotKey = slot.dataset.slot;
    const parentDef = BLOCKS[node.id];
    const slotDef = parentDef && parentDef.slots && parentDef.slots[slotKey];
    if (!slotDef || slotDef.type !== 'expression') return;
    node.slots = node.slots || {};
    node.slots[slotKey] = { id, slots: makeDefaultSlots(def) };
    rerenderScript(ctx.scriptOwner);
    return;
  }

  // Trigger / statement drops are block-level — disabled in fill-in-blank challenge mode
  if (isFillInForContext(ctx.scriptOwner)) return;
  const targetBody = e.target.closest('[data-role="body"]');
  const defaults = makeDefaultSlots(def);
  if (def.type === 'trigger') {
    if (targetBody) { alert('Trigger nie może być w ciele innego triggera.'); return; }
    script.push({ id, slots: defaults, body: [] });
  } else if (def.type === 'statement') {
    if (!targetBody) { alert('Przeciągnij blok do ciała triggera (obszar z lewym paskiem).'); return; }
    const ti = Number(targetBody.dataset.triggerIdx);
    script[ti].body.push({ id, slots: defaults });
  } else {
    return;
  }
  rerenderScript(ctx.scriptOwner);
});

document.body.addEventListener('click', e => {
  const ctx = getActiveScriptContext(e); if (!ctx) return;
  const slotEl = e.target.closest('.slot');
  if (!slotEl) return;
  if (slotEl.dataset.locked === '1') return;
  const node = slotEl.__node;
  if (!node) return;
  const def = BLOCKS[node.id];
  const slotKey = slotEl.dataset.slot;
  const slotDef = def.slots?.[slotKey];
  if (!slotDef) return;
  // nested block in slot — not a literal, skip (right-click to revert)
  const cur = node.slots ? node.slots[slotKey] : undefined;
  if (cur && typeof cur === 'object') return;
  openSlotEditor(slotEl, node, slotKey, slotDef, ctx.scriptOwner);
});

function openSlotEditor(slotEl, node, key, def, ownerKey = 'challenge') {
  const cur = node.slots ? node.slots[key] : def.default;
  let input;
  if (def.type === 'choice') {
    input = document.createElement('select');
    def.options.forEach(o => {
      const opt = document.createElement('option'); opt.value = o; opt.textContent = o;
      if (o === cur) opt.selected = true;
      input.appendChild(opt);
    });
  } else if (def.type === 'color') {
    input = document.createElement('input'); input.type = 'color'; input.value = cur;
  } else {
    input = document.createElement('input'); input.type = 'text'; input.value = cur;
  }
  input.style.cssText = 'font-family:var(--mono);font-size:12px;padding:2px 6px;width:90px;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:4px;';
  slotEl.innerHTML = '';
  slotEl.appendChild(input);
  input.focus();
  if (input.select) try { input.select(); } catch {}
  const commit = () => {
    let v = input.value;
    if (def.type === 'number') v = Number(v);
    else if (def.type === 'expression') v = isNaN(Number(v)) || v === '' ? v : Number(v);
    if (!node.slots) node.slots = {};
    node.slots[key] = v;
    rerenderScript(ownerKey);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', ev => { if (ev.key === 'Enter') input.blur(); if (ev.key === 'Escape') { ev.preventDefault(); rerenderScript(ownerKey); } });
}

document.body.addEventListener('contextmenu', e => {
  const ctx = getActiveScriptContext(e); if (!ctx) return;
  // Right-click on a slot that currently holds a nested expression → revert to default literal.
  const slot = e.target.closest('.slot');
  if (slot && slot.dataset.locked !== '1') {
    const node = slot.__node;
    if (node) {
      const slotKey = slot.dataset.slot;
      const cur = node.slots ? node.slots[slotKey] : undefined;
      if (cur && typeof cur === 'object') {
        e.preventDefault();
        const def = BLOCKS[node.id];
        const slotDef = def && def.slots && def.slots[slotKey];
        node.slots[slotKey] = slotDef ? slotDef.default : 0;
        rerenderScript(ctx.scriptOwner);
        return;
      }
    }
  }
  // Block-level removal (not allowed in fill-in-blank challenge mode).
  if (isFillInForContext(ctx.scriptOwner)) return;
  const block = e.target.closest('.palette-block');
  if (!block || !block.__node) return;
  e.preventDefault();
  if (!confirm('Usunąć ten blok?')) return;
  const script = getActiveScript(ctx.scriptOwner);
  if (!script) return;
  removeNodeFrom(script, block.__node);
  rerenderScript(ctx.scriptOwner);
});

function removeNodeFrom(script, target) {
  for (let ti = 0; ti < script.length; ti++) {
    const trig = script[ti];
    if (trig === target) { script.splice(ti, 1); return; }
    const bi = (trig.body || []).indexOf(target);
    if (bi >= 0) { trig.body.splice(bi, 1); return; }
  }
}

function makeSprite(opts = {}) {
  return {
    name: opts.name || 'sprite',
    x: opts.x ?? 0, y: opts.y ?? 0,
    w: opts.w ?? 16, h: opts.h ?? 16,
    color: opts.color ?? '#ffffff',
    vx: 0, vy: 0, gx: 0, gy: 0,
    state: {},
    script: opts.script || [],
    alive: true,
    _started: false,
  };
}

function drawScene(sprites, canvasId = 'scene') {
  const cvs = document.getElementById(canvasId);
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  sprites.forEach(s => {
    if (!s.alive && s.alive !== undefined) return;
    ctx.fillStyle = s.color;
    ctx.fillRect(Math.round(s.x), Math.round(s.y), s.w || 16, s.h || 16);
  });
}

function drawSandboxScene(sprites) {
  drawScene(sprites, 'sb-scene');
}

function evalExpr(node, ctx) {
  if (node == null) return 0;
  if (typeof node === 'number') return node;
  if (typeof node === 'string') {
    // numeric-looking strings become numbers (UI stores expression literals as strings or numbers)
    if (node !== '' && !isNaN(Number(node))) return Number(node);
    return node;
  }
  const def = BLOCKS[node.id];
  if (!def) return 0;
  switch (node.id) {
    case 'num':    return Number(node.slots.n);
    case 'my-x':   return ctx.sprite.x;
    case 'my-y':   return ctx.sprite.y;
    case 'random': {
      const min = Number(evalExpr(node.slots.min, ctx));
      const max = Number(evalExpr(node.slots.max, ctx));
      return min + Math.random() * (max - min);
    }
    case 'op': {
      const a = Number(evalExpr(node.slots.a, ctx));
      const b = Number(evalExpr(node.slots.b, ctx));
      switch (node.slots.op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b === 0 ? 0 : a / b;
        case '%': return b === 0 ? 0 : a % b;
      }
      return 0;
    }
    case 'get-state': return ctx.sprite.state[node.slots.field] ?? 0;
  }
  return 0;
}

function runStatement(node, ctx) {
  const s = ctx.sprite;
  switch (node.id) {
    case 'set-pos':     s.x = Number(evalExpr(node.slots.x, ctx)); s.y = Number(evalExpr(node.slots.y, ctx)); break;
    case 'set-size':    s.w = Number(evalExpr(node.slots.w, ctx)); s.h = Number(evalExpr(node.slots.h, ctx)); break;
    case 'set-color':   s.color = node.slots.c; break;
    case 'set-state':   s.state[node.slots.field] = evalExpr(node.slots.val, ctx); break;
    case 'set-global':  ctx.globals[node.slots.field] = evalExpr(node.slots.val, ctx); break;
    case 'move-by':     s.x += Number(evalExpr(node.slots.dx, ctx)); s.y += Number(evalExpr(node.slots.dy, ctx)); break;
    case 'set-vel':     s.vx = Number(evalExpr(node.slots.vx, ctx)); s.vy = Number(evalExpr(node.slots.vy, ctx)); break;
    case 'set-gravity': s.gx = Number(evalExpr(node.slots.gx, ctx)); s.gy = Number(evalExpr(node.slots.gy, ctx)); break;
  }
}

function runBody(body, ctx) { for (const n of body || []) runStatement(n, ctx); }

function runTrigger(trigId, sprite, globals) {
  const ctx = { sprite, globals };
  for (const trig of sprite.script) {
    if (trig.id === trigId) runBody(trig.body, ctx);
  }
}

const WORLD = { sprites: [], globals: {}, running: false, tick: 0, raf: 0, canvasId: 'scene' };

function worldReset(sprites) {
  // Fresh sprite copies (do NOT mutate the originals passed in)
  WORLD.sprites = sprites.map(s => ({ ...s, _started: false, state: {}, vx: 0, vy: 0, gx: 0, gy: 0 }));
  WORLD.globals = {};
  WORLD.tick = 0;
}

function worldStart() {
  if (WORLD.running) return;
  WORLD.running = true;
  const canvasId = WORLD.canvasId || 'scene';
  const loop = () => {
    if (!WORLD.running) return;
    stepOnce();
    drawScene(WORLD.sprites, canvasId);
    WORLD.raf = requestAnimationFrame(loop);
  };
  WORLD.raf = requestAnimationFrame(loop);
}

function worldStop() { WORLD.running = false; cancelAnimationFrame(WORLD.raf); }

function stepOnce() {
  for (const s of WORLD.sprites) {
    if (!s.alive) continue;
    if (!s._started) { runTrigger('on-start', s, WORLD.globals); s._started = true; }
    runTrigger('on-tick', s, WORLD.globals);
    s.vx += s.gx; s.vy += s.gy;
    s.x += s.vx; s.y += s.vy;
  }
  WORLD.tick++;
}

function compileSpritesForChallenge() {
  if (!STATE.stage || STATE.challenge == null) return [makeSprite()];
  const ch = CHALLENGES[STATE.stage][STATE.challenge];
  if (!ch) return [makeSprite()];
  const inits = ch.initialSprites || [{ name: 's0', color: '#00ff88' }];
  const hasExplicitPlayer = inits.some(i => i.playerEdited);
  return inits.map((init, i) => {
    const isPlayer = hasExplicitPlayer ? !!init.playerEdited : i === 0;
    const script = isPlayer ? STATE.script : (init.script || []);
    return makeSprite({ ...init, script });
  });
}

// Backward-compat alias for single-sprite paths.
function compileActiveSprite() { return compileSpritesForChallenge()[0]; }

function runHeadless(maxTicks, sprites) {
  worldReset(sprites);
  for (let i = 0; i < maxTicks; i++) stepOnce();
  // Semantics: `t: 0` = post-init state (on-start has fired, no ticks run).
  // When maxTicks > 0, on-start already fires inside the first stepOnce.
  if (maxTicks === 0) {
    for (const s of WORLD.sprites) {
      if (s.alive && !s._started) { runTrigger('on-start', s, WORLD.globals); s._started = true; }
    }
  }
  return { s: WORLD.sprites[0], sprites: WORLD.sprites, globals: WORLD.globals, tick: WORLD.tick };
}

function evalAssert(exprStr, env) {
  try {
    const fn = new Function('s', 'sprites', 'globals', 'tick', `return (${exprStr});`);
    return !!fn(env.s, env.sprites, env.globals, env.tick);
  } catch (e) {
    console.warn('assert error', e);
    return false;
  }
}

function runTests(ch) {
  const results = [];
  for (const test of ch.tests || []) {
    const maxT = test.t || 0;
    const env = runHeadless(maxT, compileSpritesForChallenge());
    results.push({ label: test.label || ('t=' + maxT), pass: evalAssert(test.assert, env) });
  }
  return results;
}

function renderTestResults(results) {
  const el = document.getElementById('ch-tests');
  el.innerHTML = results.map(r =>
    `<div class="${r.pass ? 't-pass' : 't-fail'}">${r.pass ? '✅' : '❌'} ${r.label}</div>`
  ).join('');
  const allPass = results.length > 0 && results.every(r => r.pass);
  const msg = document.getElementById('ch-msg');
  msg.className = 'ch-msg ' + (allPass ? 'success' : 'fail');
  msg.textContent = allPass ? '🎉 Brawo! Wszystkie testy przechodzą.' : 'Niektóre testy nie przechodzą.';
  return allPass;
}

function awardStar(ch, n) {
  if (!STATE.stage || STATE.challenge == null) return;
  const all = progress();
  const entry = all[STATE.stage] = all[STATE.stage] || { stars: [] };
  const prev = entry.stars[STATE.challenge] || 0;
  entry.stars[STATE.challenge] = Math.max(prev, n);
  saveProgress(all);
  const stars = entry.stars[STATE.challenge];
  document.getElementById('ch-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  updateStarsBadge();
}

function updateStarsBadge() {
  let earned = 0, total = 0;
  for (const st of STAGES) {
    const chs = CHALLENGES[st.id] || [];
    total += chs.length * 3;
    const pp = stageProgress(st.id);
    earned += (pp.stars || []).reduce((a, b) => a + (b || 0), 0);
  }
  document.getElementById('stars-badge').textContent = `⭐ ${earned} / ${total}`;
}

document.getElementById('btn-run').addEventListener('click', () => {
  worldStop();
  WORLD.canvasId = 'scene';
  worldReset(compileSpritesForChallenge());
  worldStart();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  worldStop();
  WORLD.canvasId = 'scene';
  worldReset(compileSpritesForChallenge());
  drawScene(WORLD.sprites);
});
document.getElementById('btn-check').addEventListener('click', () => {
  const ch = (CHALLENGES[STATE.stage] || [])[STATE.challenge];
  if (!ch) return;
  worldStop(); // stop any live animation
  const results = runTests(ch);
  const pass = renderTestResults(results);
  if (pass) awardStar(ch, 1);
});

// ===== Sandbox =====
const SB = {
  sprites: [],
  activeIdx: 0,
};

function sbDefaultSprite(i) {
  const palette = ['#00ff88', '#4488ff', '#ff55ff', '#ffaa00', '#00ddff', '#bb66ff'];
  return { name: `sprite${i+1}`, color: palette[i % palette.length], x: 80 + i * 60, y: 140, w: 16, h: 16, script: [] };
}

function openSandbox() {
  if (!SB.sprites.length) SB.sprites.push(sbDefaultSprite(0));
  SB.activeIdx = Math.min(SB.activeIdx, SB.sprites.length - 1);
  worldStop();
  renderSandbox();
  showView('sandbox-view');
  drawSandboxScene(SB.sprites);
}

function renderSandbox() {
  renderSandboxSpriteList();
  renderSandboxPalette();
  renderSandboxScript();
  drawSandboxScene(SB.sprites);
}

function renderSandboxSpriteList() {
  const el = document.getElementById('sb-sprite-list');
  el.innerHTML = '';
  SB.sprites.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sb-sprite-item' + (i === SB.activeIdx ? ' active' : '');
    const dot = document.createElement('span');
    dot.className = 'sb-sprite-color';
    dot.style.background = s.color;
    const name = document.createElement('span');
    name.className = 'sb-sprite-name';
    name.textContent = s.name;
    item.appendChild(dot); item.appendChild(name);
    item.addEventListener('click', () => {
      SB.activeIdx = i;
      renderSandboxSpriteList();
      renderSandboxScript();
    });
    el.appendChild(item);
  });
}

function renderSandboxPalette() {
  const el = document.getElementById('sb-palette');
  el.innerHTML = '';
  Object.keys(CATEGORIES).forEach(catId => {
    const meta = CATEGORIES[catId];
    const group = document.createElement('div');
    group.className = 'palette-cat';
    group.innerHTML = `<div class="palette-cat-label">${meta.label}</div>`;
    Object.entries(BLOCKS).filter(([,b]) => b.cat === catId).forEach(([id, b]) => {
      const bl = document.createElement('div');
      bl.className = `palette-block b-${catId}`;
      bl.draggable = true;
      bl.dataset.blockId = id;
      bl.textContent = b.label.replace(/§\w+/g, '…');
      group.appendChild(bl);
    });
    el.appendChild(group);
  });
}

function renderSandboxScript() {
  const el = document.getElementById('sb-script-area');
  el.innerHTML = '';
  const active = SB.sprites[SB.activeIdx];
  if (!active) return;
  const opts = { lockLiterals: false };
  (active.script || []).forEach((trig, ti) => {
    const def = BLOCKS[trig.id]; if (!def) return;
    el.appendChild(renderBlockEl(trig, def, opts));
    const body = document.createElement('div');
    body.className = 'script-body';
    body.dataset.role = 'body';
    body.dataset.triggerIdx = ti;
    body.style.cssText = 'margin-left:20px;border-left:2px solid var(--border);padding-left:10px;margin-bottom:8px;';
    (trig.body || []).forEach(n => {
      const def2 = BLOCKS[n.id]; if (!def2) return;
      body.appendChild(renderBlockEl(n, def2, opts));
    });
    el.appendChild(body);
  });
}

document.getElementById('sb-add').addEventListener('click', () => {
  SB.sprites.push(sbDefaultSprite(SB.sprites.length));
  SB.activeIdx = SB.sprites.length - 1;
  renderSandbox();
});
document.getElementById('sb-del').addEventListener('click', () => {
  if (SB.sprites.length <= 1) return;
  SB.sprites.splice(SB.activeIdx, 1);
  SB.activeIdx = Math.min(SB.activeIdx, SB.sprites.length - 1);
  renderSandbox();
});
document.getElementById('sb-run').addEventListener('click', () => {
  worldStop();
  WORLD.canvasId = 'sb-scene';
  const sprites = SB.sprites.map(s => makeSprite({ ...s, script: s.script }));
  worldReset(sprites);
  worldStart();
});
document.getElementById('sb-pause').addEventListener('click', () => worldStop());
document.getElementById('sb-step').addEventListener('click', () => {
  if (WORLD.sprites.length === 0) {
    WORLD.canvasId = 'sb-scene';
    worldReset(SB.sprites.map(s => makeSprite({ ...s, script: s.script })));
  }
  try { stepOnce(); } catch (e) { console.warn('sandbox step error:', e); }
  drawScene(WORLD.sprites, 'sb-scene');
});
document.getElementById('sb-reset').addEventListener('click', () => {
  worldStop();
  WORLD.canvasId = 'sb-scene';
  worldReset(SB.sprites.map(s => makeSprite({ ...s, script: s.script })));
  drawScene(WORLD.sprites, 'sb-scene');
});

renderTree();
updateStarsBadge();

window.ps = { STATE, showView };
window.ps.renderTree = renderTree;
window.ps.renderPalette = renderPalette;
window.ps.renderScript = renderScript;
window.ps.openStage = openStage;
window.ps.openChallenge = openChallenge;
window.ps.backToTree = backToTree;
window.ps.backToStage = backToStage;
window.ps.progress = progress;
window.ps.saveProgress = saveProgress;
window.ps.stageProgress = stageProgress;
window.ps.makeSprite = makeSprite;
window.ps.drawScene = drawScene;
window.ps.evalExpr = evalExpr;
window.ps.runStatement = runStatement;
window.ps.runTrigger = runTrigger;
window.ps.WORLD = WORLD;
window.ps.worldReset = worldReset;
window.ps.worldStart = worldStart;
window.ps.worldStop = worldStop;
window.ps.stepOnce = stepOnce;
window.ps.compileActiveSprite = compileActiveSprite;
window.ps.compileSpritesForChallenge = compileSpritesForChallenge;
window.ps.runHeadless = runHeadless;
window.ps.evalAssert = evalAssert;
window.ps.runTests = runTests;
window.ps.renderTestResults = renderTestResults;
window.ps.awardStar = awardStar;
window.ps.updateStarsBadge = updateStarsBadge;
window.ps.SB = SB;
window.ps.openSandbox = openSandbox;
window.ps.renderSandbox = renderSandbox;
window.ps.drawSandboxScene = drawSandboxScene;
window.ps.saveCurrentScript = saveCurrentScript;
window.ps.loadSavedScript = loadSavedScript;

function __dev_tests() {
  const fail = [], pass = [];
  const t = (name, cond) => (cond ? pass : fail).push(name);

  const s1 = makeSprite({ x: 7, y: 3 });
  t('num literal',   evalExpr({ id: 'num', slots: { n: 5 } }, { sprite: s1 }) === 5);
  t('op add',        evalExpr({ id: 'op', slots: { a: 2, op: '+', b: 3 } }, { sprite: s1 }) === 5);
  t('op div zero',   evalExpr({ id: 'op', slots: { a: 10, op: '/', b: 0 } }, { sprite: s1 }) === 0);
  t('my-x',          evalExpr({ id: 'my-x' }, { sprite: s1 }) === 7);

  const s2 = makeSprite();
  runStatement({ id: 'set-pos', slots: { x: 100, y: 80 } }, { sprite: s2 });
  t('set-pos', s2.x === 100 && s2.y === 80);
  runStatement({ id: 'set-state', slots: { field: 'hp', val: 3 } }, { sprite: s2 });
  t('set-state', s2.state.hp === 3);

  worldReset([ makeSprite({ x: 0, y: 0, script: [
    { id: 'on-start', body: [ { id: 'set-pos', slots: { x: 0, y: 0 } } ] },
    { id: 'on-tick',  body: [ { id: 'move-by', slots: { dx: 1, dy: 0 } } ] },
  ]}) ]);
  for (let i = 0; i < 10; i++) stepOnce();
  t('tick loop moves sprite', WORLD.sprites[0].x === 10);

  console.log('%cPixelStack dev tests', 'font-weight:bold', `${pass.length} pass, ${fail.length} fail`);
  pass.forEach(n => console.log('  ✅', n));
  fail.forEach(n => console.warn('  ❌', n));
  return { pass: pass.length, fail: fail.length };
}

if (new URLSearchParams(location.search).get('dev') === '1') {
  window.addEventListener('load', () => { setTimeout(__dev_tests, 100); });
}
window.ps.__dev_tests = __dev_tests;
</script>
