<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitStack — Logic & Binary</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090f; --bg2: #0f0f1a; --bg3: #16162a; --bg4: #1e1e36;
  --border: #2a2a4a; --border2: #3a3a6a;
  --text: #e8e8f0; --muted: #6060a0;
  --green: #00ff88; --blue: #4488ff; --purple: #bb66ff;
  --red: #ff4466; --orange: #ffaa00; --cyan: #00ddff; --yellow: #ffd93d;
  --font: 'Outfit', sans-serif; --mono: 'DM Mono', monospace;
  --r: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

/* ── TOP BAR ── */
.topbar {
  height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
}
.topbar .logo { font-weight: 900; font-size: 18px; letter-spacing: -.5px; }
.topbar .logo span { color: var(--cyan); }
.topbar .logo em { font-style: normal; color: var(--yellow); }
.topbar .sep { width: 1px; height: 24px; background: var(--border); }
.topbar .mode-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: var(--font);
  font-weight: 600; font-size: 12px; cursor: pointer; transition: all .15s;
}
.topbar .mode-btn:hover { border-color: var(--border2); color: var(--text); }
.topbar .mode-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.topbar .spacer { flex: 1; }
.topbar .badge { font-family: var(--mono); font-size: 10px; color: var(--muted); }

/* ── MAIN AREA ── */
.main { height: calc(100% - 48px); display: flex; position: relative; }
.view { display: none; width: 100%; height: 100%; }
.view.active { display: flex; }

/* ═══ SKILL TREE ═══ */
#tree-view {
  flex-direction: column; align-items: center; overflow-y: auto;
  padding: 40px 20px 80px; gap: 0;
}
.tree-track-label {
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
  padding: 6px 16px; border-radius: 20px; margin: 30px 0 16px;
}
.tree-track-label.green { color: var(--green); background: #00ff8815; }
.tree-track-label.blue { color: var(--blue); background: #4488ff15; }
.tree-track-label.purple { color: var(--purple); background: #bb66ff15; }
.tree-connector { width: 2px; height: 28px; background: var(--border); }
.tree-branch { display: flex; gap: 40px; align-items: flex-start; }
.tree-branch .tree-connector { display: none; }
.tree-branch-line {
  width: 80px; height: 2px; background: var(--border); align-self: center; margin-top: 24px;
}

.tree-node {
  width: 200px; padding: 16px; border-radius: var(--r); border: 2px solid var(--border);
  background: var(--bg2); text-align: center; cursor: pointer; transition: all .2s;
  position: relative;
}
.tree-node:hover { border-color: var(--border2); transform: translateY(-2px); }
.tree-node.locked { opacity: .4; cursor: default; filter: grayscale(.6); }
.tree-node.locked:hover { transform: none; border-color: var(--border); }
.tree-node.available { border-color: var(--border2); animation: pulse-border 2s ease-in-out infinite; }
.tree-node.complete .node-icon { filter: none; }
.tree-node .node-icon { font-size: 28px; margin-bottom: 6px; }
.tree-node .node-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.tree-node .node-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.tree-node .node-stars { margin-top: 8px; font-size: 14px; letter-spacing: 2px; }
@keyframes pulse-border { 0%,100% { box-shadow: 0 0 0 0 transparent; } 50% { box-shadow: 0 0 16px -4px var(--border2); } }

/* node colors */
.tree-node.t-green { border-color: #00ff8833; }
.tree-node.t-green.available { border-color: var(--green); box-shadow: 0 0 20px -6px var(--green); }
.tree-node.t-green.complete { border-color: var(--green); background: #00ff8808; }
.tree-node.t-blue { border-color: #4488ff33; }
.tree-node.t-blue.available { border-color: var(--blue); box-shadow: 0 0 20px -6px var(--blue); }
.tree-node.t-blue.complete { border-color: var(--blue); background: #4488ff08; }
.tree-node.t-purple { border-color: #bb66ff33; }
.tree-node.t-purple.available { border-color: var(--purple); box-shadow: 0 0 20px -6px var(--purple); }
.tree-node.t-purple.complete { border-color: var(--purple); background: #bb66ff08; }

/* ═══ CHALLENGE VIEW ═══ */
#challenge-view, #sandbox-view {
  flex-direction: column; padding: 0;
}
.challenge-header {
  padding: 16px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.challenge-header .ch-back {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 12px;
}
.challenge-header .ch-back:hover { color: var(--text); border-color: var(--border2); }
.challenge-header .ch-title { font-weight: 800; font-size: 16px; flex: 1; }
.challenge-header .ch-goal {
  font-size: 12px; color: var(--muted); max-width: 400px; line-height: 1.4;
}
.challenge-header .ch-stars { font-size: 18px; letter-spacing: 2px; }
.challenge-body { flex: 1; display: flex; overflow: hidden; }

/* ═══ CIRCUIT BUILDER ═══ */
.circuit {
  flex: 1; display: flex; padding: 20px; gap: 12px; overflow-x: auto; align-items: flex-start;
}
.circuit-col {
  min-width: 140px; max-width: 180px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
  display: flex; flex-direction: column; gap: 0; overflow: hidden;
}
.circuit-col-header {
  padding: 8px 12px; font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border);
  text-align: center;
}
.circuit-col-body { padding: 8px; display: flex; flex-direction: column; gap: 8px; min-height: 120px; }
.circuit-arrow {
  font-size: 20px; color: var(--border); align-self: center; flex-shrink: 0; margin-top: 40px;
}

/* input switches */
.input-switch {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 8px; background: var(--bg3); cursor: pointer; user-select: none;
  transition: background .15s;
}
.input-switch:hover { background: var(--bg4); }
.input-switch .sw-label { font-weight: 700; font-size: 13px; flex: 1; }
.input-switch .sw-bulb {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all .2s;
}
.input-switch.on .sw-bulb {
  background: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 12px var(--yellow);
}
.input-switch .sw-val {
  font-family: var(--mono); font-weight: 700; font-size: 14px; width: 18px; text-align: center;
}
.input-switch.on .sw-val { color: var(--yellow); }

/* gates */
.gate-box {
  padding: 10px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--bg3); position: relative; cursor: default;
}
.gate-box .gate-label { font-weight: 800; font-size: 12px; text-align: center; margin-bottom: 4px; }
.gate-box .gate-inputs { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 6px; font-family: var(--mono); }
.gate-box .gate-output {
  text-align: center; font-family: var(--mono); font-weight: 700; font-size: 16px;
}
.gate-box .gate-rm {
  position: absolute; top: 4px; right: 6px; background: none; border: none;
  color: var(--border); cursor: pointer; font-size: 12px;
}
.gate-box .gate-rm:hover { color: var(--red); }
.gate-box .gate-wire-btn {
  margin-top: 6px; width: 100%; padding: 4px; border-radius: 4px;
  border: 1px dashed var(--border); background: transparent; color: var(--muted);
  font-size: 10px; cursor: pointer; font-family: var(--font);
}
.gate-box .gate-wire-btn:hover { border-color: var(--border2); color: var(--text); }

/* gate colors */
.gate-box.g-not { border-color: #ff446644; }
.gate-box.g-not .gate-label { color: var(--red); }
.gate-box.g-and { border-color: #4488ff44; }
.gate-box.g-and .gate-label { color: var(--blue); }
.gate-box.g-or { border-color: #00ff8844; }
.gate-box.g-or .gate-label { color: var(--green); }
.gate-box.g-xor { border-color: #ffaa0044; }
.gate-box.g-xor .gate-label { color: var(--orange); }

.gate-output-on { color: var(--yellow) !important; }
.gate-output-off { color: var(--muted) !important; }

/* output bulbs */
.output-bulb {
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  gap: 6px; padding: 12px; border-radius: 8px; background: var(--bg3);
}
.output-bulb .bulb-icon {
  font-size: 36px; transition: all .3s;
}
.output-bulb.on .bulb-icon { filter: drop-shadow(0 0 12px var(--yellow)); }
.output-bulb .bulb-val {
  font-family: var(--mono); font-weight: 700; font-size: 18px;
}
.output-bulb.on .bulb-val { color: var(--yellow); }

/* gate palette */
.gate-palette {
  width: 180px; background: var(--bg2); border-left: 1px solid var(--border);
  padding: 12px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
}
.gate-palette h3 {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 4px;
}
.gate-pal-item {
  padding: 8px 10px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--bg3); cursor: grab; user-select: none; font-weight: 700;
  font-size: 12px; text-align: center; transition: transform .1s;
}
.gate-pal-item:hover { transform: translateX(3px); }
.gate-pal-item.g-not { color: var(--red); border-color: #ff446633; }
.gate-pal-item.g-and { color: var(--blue); border-color: #4488ff33; }
.gate-pal-item.g-or { color: var(--green); border-color: #00ff8833; }
.gate-pal-item.g-xor { color: var(--orange); border-color: #ffaa0033; }

/* drop zone */
.gate-drop {
  min-height: 40px; border: 2px dashed var(--border); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--border); transition: all .15s;
}
.gate-drop.drag-over { border-color: var(--cyan); color: var(--cyan); background: #00ddff08; }

/* challenge buttons */
.challenge-controls {
  padding: 12px 24px; background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; gap: 12px; align-items: center;
}
.btn {
  padding: 8px 20px; border-radius: 8px; border: none; font-family: var(--font);
  font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s;
}
.btn-check { background: var(--green); color: #000; }
.btn-check:hover { filter: brightness(1.1); }
.btn-reset { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.btn-reset:hover { color: var(--text); border-color: var(--border2); }
.btn-hint { background: var(--bg3); color: var(--orange); border: 1px solid #ffaa0033; }
.btn-hint:hover { background: #ffaa0011; }
.challenge-msg { flex: 1; font-size: 13px; font-weight: 600; }
.challenge-msg.success { color: var(--green); }
.challenge-msg.fail { color: var(--red); }

/* ═══ TOPIC CHALLENGE LIST ═══ */
.topic-list {
  max-width: 500px; margin: 0 auto; padding: 40px 20px; width: 100%;
}
.topic-list h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
.topic-list .topic-desc { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
.challenge-item {
  padding: 14px 16px; border-radius: var(--r); border: 1px solid var(--border);
  background: var(--bg2); margin-bottom: 8px; display: flex; align-items: center;
  gap: 12px; cursor: pointer; transition: all .15s;
}
.challenge-item:hover { border-color: var(--border2); transform: translateX(4px); }
.challenge-item .ci-num { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 24px; }
.challenge-item .ci-title { flex: 1; font-weight: 600; font-size: 13px; }
.challenge-item .ci-stars { font-size: 14px; letter-spacing: 1px; }

/* task modal */
.task-modal {
  position: fixed; inset: 0; background: #000000cc; display: flex;
  align-items: center; justify-content: center; z-index: 180; padding: 24px;
}
.task-box {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
  padding: 28px 32px; max-width: 520px; width: 100%;
  max-height: 80vh; overflow-y: auto;
  animation: pop-in .25s ease-out;
}
.task-box h2 { font-size: 22px; margin-bottom: 4px; }
.task-box .task-type { font-size: 11px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
.task-box .task-goal { font-size: 15px; line-height: 1.5; color: var(--text); margin-bottom: 18px; }
.task-box .task-target { margin: 18px 0; padding: 14px; background: var(--bg3); border-radius: 8px; border: 1px solid var(--border); }
.task-box .task-target .task-target-label {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 8px;
}
.task-box .task-target table.truth-table { margin: 4px auto; }
.task-box .task-target .task-target-line { font-family: var(--mono); font-size: 15px; color: var(--yellow); font-weight: 700; }
.task-box .task-hint {
  font-size: 13px; color: var(--orange); background: #ffaa0011; padding: 10px 12px;
  border-radius: 8px; border: 1px solid #ffaa0033; margin-top: 12px;
}
.task-box .task-hint::before { content: '💡 '; }
.task-box .task-close { margin-top: 18px; width: 100%; }

/* success overlay */
.success-overlay {
  position: fixed; inset: 0; background: #000000aa; display: flex;
  align-items: center; justify-content: center; z-index: 200;
}
.success-box {
  background: var(--bg2); border: 2px solid var(--green); border-radius: 16px;
  padding: 40px; text-align: center; max-width: 360px;
  animation: pop-in .3s ease-out;
}
.success-box h2 { font-size: 28px; margin-bottom: 8px; }
.success-box .stars { font-size: 36px; letter-spacing: 6px; margin: 16px 0; }
.success-box .btn { margin-top: 12px; }
@keyframes pop-in { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* truth table */
.truth-table {
  margin: 12px auto; border-collapse: collapse; font-family: var(--mono); font-size: 12px;
}
.truth-table th, .truth-table td {
  padding: 4px 10px; border: 1px solid var(--border); text-align: center;
}
.truth-table th { background: var(--bg3); color: var(--muted); font-size: 10px; text-transform: uppercase; }
.truth-table td.on { color: var(--yellow); font-weight: 700; }
.truth-table td.off { color: var(--muted); }
.truth-table td.match { background: #00ff8812; }
.truth-table td.mismatch { background: #ff446612; }

/* ── Gate truth table (expandable) ── */
.gate-chevron {
  display: block; margin: 4px auto 0;
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-family: var(--font);
  font-size: 10px; padding: 1px 10px; border-radius: 4px;
  cursor: pointer; transition: color .15s, border-color .15s;
}
.gate-chevron:hover { color: var(--text); border-color: var(--border2); }
.gate-truth {
  margin: 8px auto 2px; border-collapse: collapse;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
}
.gate-truth th, .gate-truth td {
  padding: 2px 7px; border: 1px solid var(--border); text-align: center;
}
.gate-truth th { font-size: 9px; text-transform: uppercase; background: var(--bg3); color: var(--muted); }
.gate-truth tr.active td { background: #ffd93d22; color: var(--yellow); font-weight: 700; }

/* ── WIRES (SVG layer) ── */
.circuit { position: relative; }
.wire-layer {
  position: absolute; top: 0; left: 0;
  pointer-events: none; overflow: visible;
}
.wire-layer .wire {
  fill: none; stroke: var(--border2); stroke-width: 2;
  pointer-events: stroke; cursor: pointer;
  transition: stroke .15s, stroke-width .15s, filter .2s;
}
.wire-layer .wire.active {
  stroke: var(--yellow); stroke-width: 2.5;
  filter: drop-shadow(0 0 3px #ffd93d88);
}
.wire-layer .wire:hover {
  stroke: var(--red); stroke-width: 3.5;
  filter: drop-shadow(0 0 4px #ff446688);
}
/* wider invisible path layered underneath for easier click-hit on thin wires */
.wire-layer .wire-hit {
  fill: none; stroke: transparent; stroke-width: 14;
  pointer-events: stroke; cursor: pointer;
}

/* ── PORTS ── */
.gate-box, .input-switch, .output-bulb { position: relative; }
.port {
  position: absolute; width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border2); background: var(--bg); cursor: pointer;
  z-index: 5; transition: transform .12s, box-shadow .15s, background .15s, border-color .15s;
}
.port:hover { transform: scale(1.25); }
.port.port-out { right: -8px; top: 50%; transform: translateY(-50%); background: var(--bg3); }
.port.port-out:hover { transform: translateY(-50%) scale(1.25); }
.port.port-in { left: -8px; }
.gate-box[data-inputs="1"] .port.port-in { top: 50%; transform: translateY(-50%); }
.gate-box[data-inputs="1"] .port.port-in:hover { transform: translateY(-50%) scale(1.25); }
.gate-box[data-inputs="2"] .port.port-in.p0 { top: 30%; transform: translateY(-50%); }
.gate-box[data-inputs="2"] .port.port-in.p0:hover { transform: translateY(-50%) scale(1.25); }
.gate-box[data-inputs="2"] .port.port-in.p1 { top: 70%; transform: translateY(-50%); }
.gate-box[data-inputs="2"] .port.port-in.p1:hover { transform: translateY(-50%) scale(1.25); }
.output-bulb .port.port-in { top: 50%; transform: translateY(-50%); }
.output-bulb .port.port-in:hover { transform: translateY(-50%) scale(1.25); }

.port.occupied { background: var(--yellow); border-color: var(--yellow); }
.port.armed { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 0 0 var(--cyan); animation: port-pulse 1.2s ease-in-out infinite; }
.port.valid { border-color: var(--cyan); animation: port-pulse-outline 1.2s ease-in-out infinite; }
.port.invalid { opacity: .25; pointer-events: none; }
.port.missing { border-color: var(--red); border-style: dashed; animation: port-pulse-missing 1.6s ease-in-out infinite; }
@keyframes port-pulse { 0%,100% { box-shadow: 0 0 0 0 #00ddff88; } 50% { box-shadow: 0 0 0 8px #00ddff00; } }
@keyframes port-pulse-outline { 0%,100% { box-shadow: 0 0 0 0 #00ddff88; } 50% { box-shadow: 0 0 0 6px #00ddff00; } }
@keyframes port-pulse-missing { 0%,100% { box-shadow: 0 0 0 0 #ff446688; } 50% { box-shadow: 0 0 0 6px #ff446600; } }

/* ── WIRE BANNER ── */
.wire-banner {
  flex: 0 0 auto; height: 36px;
  background: var(--bg3); border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center; gap: 12px;
  color: var(--cyan); font-weight: 600; font-size: 13px;
  animation: banner-slide .18s ease-out;
}
.wire-banner button {
  background: none; border: 1px solid var(--border2); color: var(--muted);
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-family: var(--font);
}
.wire-banner button:hover { color: var(--red); border-color: var(--red); }
@keyframes banner-slide { from { transform: translateY(-100%); } to { transform: translateY(0); } }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><span>Bit</span><em>Stack</em></div>
  <div class="sep"></div>
  <button class="mode-btn active" onclick="showView('tree')">🌳 Skill Tree</button>
  <button class="mode-btn" onclick="showView('sandbox')">🔧 Sandbox</button>
  <div class="spacer"></div>
  <div class="badge">Coding Tree</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SKILL TREE VIEW -->
  <div id="tree-view" class="view active"></div>

  <!-- TOPIC / CHALLENGE LIST -->
  <div id="topic-view" class="view" style="overflow-y:auto;"></div>

  <!-- CHALLENGE VIEW -->
  <div id="challenge-view" class="view"></div>

  <!-- SANDBOX VIEW -->
  <div id="sandbox-view" class="view"></div>

</div>

<script>
// ════════════════════════════════════════════════════
//  DATA: SKILL TREE & CHALLENGES
// ════════════════════════════════════════════════════

const GATE_DEFS = {
  NOT: { label: 'NOT', kid: 'Odwroc', inputs: 1, cls: 'g-not', icon: '🔴', fn: (a) => a[0] ? 0 : 1 },
  AND: { label: 'AND', kid: 'OBA', inputs: 2, cls: 'g-and', icon: '🔵', fn: (a) => (a[0] && a[1]) ? 1 : 0 },
  OR:  { label: 'OR',  kid: 'LUB', inputs: 2, cls: 'g-or',  icon: '🟢', fn: (a) => (a[0] || a[1]) ? 1 : 0 },
  XOR: { label: 'XOR', kid: 'ROZNE', inputs: 2, cls: 'g-xor', icon: '🟠', fn: (a) => (a[0] !== a[1]) ? 1 : 0 },
};

function saveProgress() { localStorage.setItem('bitstack-progress', JSON.stringify(progress)); }

function getTopicProgress(id) { return progress[id] || { stars: [] }; }
function isTopicComplete(id) {
  const p = getTopicProgress(id);
  const t = TOPICS.find(t => t.id === id);
  return t && p.stars && p.stars.length >= t.challenges.length && p.stars.every(s => s > 0);
}
function isTopicAvailable(id) {
  const t = TOPICS.find(t => t.id === id);
  if (!t) return false;
  return t.requires.every(r => isTopicComplete(r));
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));

  if (name === 'tree') {
    document.getElementById('tree-view').classList.add('active');
    document.querySelectorAll('.mode-btn')[0].classList.add('active');
    renderTree();
  } else if (name === 'sandbox') {
    document.getElementById('sandbox-view').classList.add('active');
    document.querySelectorAll('.mode-btn')[1].classList.add('active');
    openSandbox();
  } else if (name === 'topic') {
    document.getElementById('topic-view').classList.add('active');
  } else if (name === 'challenge') {
    document.getElementById('challenge-view').classList.add('active');
  }
}

// ════════════════════════════════════════════════════
//  SKILL TREE RENDER
// ════════════════════════════════════════════════════
function renderTree() {
  const el = document.getElementById('tree-view');
  let html = '';

  const tracks = [
    { label: 'Binary Basics', cls: 'green', ids: ['onoff','binary-count','binary-convert'] },
    { label: 'Logic Gates', cls: 'blue', ids: ['gate-not','gate-and','gate-or','gate-xor','compose-series','compose-parallel','gate-combine','build-xor'] },
    { label: 'Logic Laws', cls: 'purple', ids: ['truth-tables','demorgan1','demorgan2','demorgan-prove'] },
  ];

  tracks.forEach(track => {
    html += `<div class="tree-track-label ${track.cls}">${track.label}</div>`;
    track.ids.forEach((id, i) => {
      const t = TOPICS.find(x => x.id === id);
      const complete = isTopicComplete(id);
      const available = isTopicAvailable(id);
      const locked = !complete && !available;
      const p = getTopicProgress(id);
      const starsHtml = t.challenges.map((_, ci) => {
        const s = (p.stars && p.stars[ci]) || 0;
        return s >= 1 ? '⭐' : '☆';
      }).join('');

      let cls = `tree-node t-${track.cls}`;
      if (complete) cls += ' complete';
      else if (available) cls += ' available';
      else cls += ' locked';

      // Branch layout for parallel nodes
      const isParallel = (id === 'gate-not' || id === 'gate-and') || (id === 'demorgan1' || id === 'demorgan2');
      const pairStart = (id === 'gate-not' || id === 'demorgan1');
      const pairEnd = (id === 'gate-and' || id === 'demorgan2');

      if (pairStart) html += '<div class="tree-branch">';

      if (i > 0 && !isParallel) html += '<div class="tree-connector"></div>';

      html += `<div class="${cls}" onclick="${locked ? '' : `openTopic('${id}')`}">
        <div class="node-icon">${t.icon}</div>
        <div class="node-title">${t.title}</div>
        <div class="node-desc">${t.desc}</div>
        <div class="node-stars">${starsHtml}</div>
      </div>`;

      if (pairStart) html += '<div class="tree-branch-line"></div>';
      if (pairEnd) html += '</div>';
    });
  });

  el.innerHTML = html;
}

    <button class="btn btn-reset" onclick="showView('tree')" style="margin-bottom:16px;">← Powrot</button>
    <h2>${currentTopic.icon} ${currentTopic.title}</h2>
    <p class="topic-desc">${currentTopic.desc}</p>`;

  currentTopic.challenges.forEach((ch, i) => {
    const stars = (p.stars && p.stars[i]) || 0;
    const starsHtml = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    html += `<div class="challenge-item" onclick="openChallenge('${id}', ${i})">
      <div class="ci-num">#${i+1}</div>
      <div class="ci-title">${ch.title}</div>
      <div class="ci-stars">${starsHtml}</div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
  showView('topic');
}

// ════════════════════════════════════════════════════
//  CHALLENGE
// ════════════════════════════════════════════════════
function openChallenge(topicId, idx) {
  currentTopic = TOPICS.find(t => t.id === topicId);
  currentChallengeIdx = idx;
  currentChallenge = currentTopic.challenges[idx];
  const ch = currentChallenge;

  if (ch.type === 'binary-number') renderBinaryChallenge(ch);
  else if (ch.type === 'quiz') renderQuizChallenge(ch);
  else if (ch.type === 'truth-table-fill') renderTruthTableFill(ch);
  else if (ch.type === 'truth-table-compare') renderTruthTableCompare(ch);
  else if (ch.type === 'predict') renderPredictChallenge(ch);
  else if (ch.type === 'wire') renderWireChallenge(ch);
  else if (ch.type === 'fill') renderFillChallenge(ch);
  else if (ch.type === 'circuit' || ch.type === 'multi-input' || ch.type === 'sandbox') renderCircuitChallenge(ch);
  else return;

  // first time opening this challenge? auto-show the task description
  if (!isTaskSeen(topicId, idx)) {
    markTaskSeen(topicId, idx);
    showTaskModal();
  }
}

function awardStars(stars) {
  const id = currentTopic.id;
  if (!progress[id]) progress[id] = { stars: [] };
  const prev = progress[id].stars[currentChallengeIdx] || 0;
  progress[id].stars[currentChallengeIdx] = Math.max(prev, stars);
  saveProgress();
}

const TASK_SEEN_KEY = 'bitstack-seen-tasks';
function taskSeenMap() {
  try { return JSON.parse(localStorage.getItem(TASK_SEEN_KEY) || '{}'); }
  catch { return {}; }
}
function isTaskSeen(topicId, idx) {
  return !!taskSeenMap()[`${topicId}#${idx}`];
}
function markTaskSeen(topicId, idx) {
  const m = taskSeenMap();
  m[`${topicId}#${idx}`] = 1;
  localStorage.setItem(TASK_SEEN_KEY, JSON.stringify(m));
}

function taskTypeLabel(t) {
  return ({
    'predict': 'PRZEWIDUJ',
    'wire': 'POLACZ BRAMKI',
    'fill': 'WYBIERZ BRAMKE',
    'circuit': 'ZBUDUJ UKLAD',
    'sandbox': 'PIASKOWNICA',
    'multi-input': 'USTAW PRZELACZNIKI',
    'binary-number': 'LICZBA BINARNA',
    'quiz': 'PYTANIE',
    'truth-table-fill': 'WYPELNIJ TABLICE',
    'truth-table-compare': 'PORONAJ TABLICE',
  })[t] || '';
}

function taskTargetHtml(ch) {
  const t = ch.type;

  if (t === 'circuit' || t === 'wire') {
    const inputs = ch.inputs || ['A','B'];
    const n = inputs.length;
    const rows = [];
    for (let i = 0; i < (1 << n); i++) {
      const combo = {};
      inputs.forEach((name, bit) => combo[name] = (i >> (n - 1 - bit)) & 1);
      const out = ch.targetFn ? ch.targetFn(combo) : 0;
      rows.push({ combo, out });
    }
    const headers = inputs.map(n => `<th>${n}</th>`).join('') + '<th>wynik</th>';
    const body = rows.map(r => {
      const cells = inputs.map(n => `<td class="${r.combo[n]?'on':'off'}">${r.combo[n]}</td>`).join('');
      return `<tr>${cells}<td class="${r.out?'on':'off'}">${r.out}</td></tr>`;
    }).join('');
    return `<div class="task-target">
      <div class="task-target-label">Lampka ma swiecic gdy:</div>
      <table class="truth-table"><tr>${headers}</tr>${body}</table>
    </div>`;
  }

  if (t === 'fill') {
    // Simulate preset with the correct answer to derive target truth table
    const inputs = ch.inputs || ['A','B'];
    const saveLayers = circuitLayers;
    const saveInputs = circuitInputs;
    const saveValues = { ...circuitValues };
    const saveOutput = circuitOutputWire;
    try {
      const clone = (ch.preset.layers || []).map(layer =>
        layer.map(g => ({ type: g.type === '?' ? ch.answer : g.type, wires: (g.wires || []).map(w => w ? {...w} : null) }))
      );
      circuitLayers = clone;
      circuitInputs = inputs;
      circuitValues = {};
      // find output via heuristic
      let ow = null;
      for (let i = clone.length - 1; i >= 0; i--) if (clone[i].length > 0) { ow = { layer: i, idx: clone[i].length - 1 }; break; }
      circuitOutputWire = ow;
      const n = inputs.length;
      const rows = [];
      for (let i = 0; i < (1 << n); i++) {
        const combo = {};
        inputs.forEach((name, bit) => combo[name] = (i >> (n - 1 - bit)) & 1);
        inputs.forEach(name => circuitValues[name] = combo[name]);
        evaluateCircuit();
        rows.push({ combo, out: getFinalOutput() });
      }
      const headers = inputs.map(n => `<th>${n}</th>`).join('') + '<th>wynik</th>';
      const body = rows.map(r => {
        const cells = inputs.map(n => `<td class="${r.combo[n]?'on':'off'}">${r.combo[n]}</td>`).join('');
        return `<tr>${cells}<td class="${r.out?'on':'off'}">${r.out}</td></tr>`;
      }).join('');
      return `<div class="task-target">
        <div class="task-target-label">Bramka w miejscu "?" ma dawac taka tabelke:</div>
        <table class="truth-table"><tr>${headers}</tr>${body}</table>
      </div>`;
    } finally {
      circuitLayers = saveLayers;
      circuitInputs = saveInputs;
      circuitValues = saveValues;
      circuitOutputWire = saveOutput;
      evaluateCircuit();
    }
  }

  if (t === 'multi-input') {
    const target = ch.targetValues || {};
    const line = Object.entries(target).map(([k,v]) => `${k}=${v}`).join(', ');
    return `<div class="task-target">
      <div class="task-target-label">Ustaw przelaczniki tak:</div>
      <div class="task-target-line">${line}</div>
    </div>`;
  }

  if (t === 'binary-number') {
    const bits = ch.bits || 4;
    const bin = ch.target.toString(2).padStart(bits, '0');
    return `<div class="task-target">
      <div class="task-target-label">Pokaz liczbe:</div>
      <div class="task-target-line">${ch.target}<span style="color:var(--muted);font-size:12px;margin-left:12px;">(binarnie: ${bin})</span></div>
    </div>`;
  }

  if (t === 'quiz') {
    return `<div class="task-target">
      <div class="task-target-label">Pytanie:</div>
      <div class="task-target-line" style="font-family:var(--font);font-weight:600;">${ch.question}</div>
    </div>`;
  }

  if (t === 'predict') {
    return `<div class="task-target">
      <div class="task-target-label">Twoje zadanie:</div>
      <div style="font-size:13px;color:var(--text);line-height:1.5;">Pobaw sie przelacznikami, zobacz co robi uklad, a potem wypelnij tabele prawdy na dole ekranu. Kliknij "?" w kolumnie wynik, zeby wpisac 0 lub 1 dla kazdej kombinacji.</div>
    </div>`;
  }

  // truth-table-fill / truth-table-compare / sandbox — no explicit target
  return '';
}

function showTaskModal() {
  const ch = currentChallenge;
  if (!ch) return;
  document.querySelectorAll('.task-modal').forEach(m => m.remove());
  const overlay = document.createElement('div');
  overlay.className = 'task-modal';
  overlay.innerHTML = `<div class="task-box">

  </div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function showSuccess(stars) {
  awardStars(stars);
  const starsHtml = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  const hasNext = currentChallengeIdx < currentTopic.challenges.length - 1;
  const overlay = document.createElement('div');
  overlay.className = 'success-overlay';
  overlay.innerHTML = `<div class="success-box">
    <h2>Brawo! 🎉</h2>
    <div class="stars">${starsHtml}</div>
    <button class="btn btn-check" onclick="this.closest('.success-overlay').remove();${hasNext ? `openChallenge('${currentTopic.id}', ${currentChallengeIdx+1})` : `openTopic('${currentTopic.id}')`}">${hasNext ? 'Nastepne →' : 'Powrot'}</button>
  </div>`;
  document.body.appendChild(overlay);
}

// ════════════════════════════════════════════════════
//  PORT WIRING (arm source → click target)
// ════════════════════════════════════════════════════
function portsEqual(a, b) {
  return a && b && a.kind === b.kind && a.layer === b.layer && a.idx === b.idx;
}

function armPort(kind, layer, idx) {
  const p = { kind, layer, idx };
  armedPort = portsEqual(armedPort, p) ? null : p;
  refreshCircuit();
}

function cancelArm() {
  if (!armedPort) return;
  armedPort = null;
  refreshCircuit();
}

function isValidTarget(target) {
  if (!armedPort) return false;
  if (target.kind === 'output') return true;
  if (target.kind === 'gate') {
    // source layer must be strictly earlier (-1 for input switches covers them)
    return armedPort.layer < target.layer;
  }
  return false;
}

function connectTarget(target) {
  if (!armedPort || !isValidTarget(target)) return;
  const src = { layer: armedPort.layer, idx: armedPort.idx };
  if (target.kind === 'output') {
    circuitOutputWire = src;
  } else {
    const gate = circuitLayers[target.layer][target.idx];
    if (!gate.wires) gate.wires = [];
    while (gate.wires.length <= target.port) gate.wires.push(null);
    gate.wires[target.port] = src;
  }
  armedPort = null;
  refreshCircuit();
}

function disconnectTarget(target) {
  if (target.kind === 'output') {
    circuitOutputWire = null;
  } else {
    const gate = circuitLayers[target.layer][target.idx];
    if (gate.wires) gate.wires[target.port] = null;
  }
  refreshCircuit();
}

function pruneWires() {
  // drop any wires pointing at non-existent gates
  circuitLayers.forEach(layer => {
    layer.forEach(gate => {
      if (!gate.wires) return;
      gate.wires = gate.wires.map(w => {
        if (!w) return null;
        if (w.layer === -1) return w.idx < circuitInputs.length ? w : null;
        const src = circuitLayers[w.layer] && circuitLayers[w.layer][w.idx];
        return src ? w : null;
      });
    });
  });
  if (circuitOutputWire) {
    const s = circuitLayers[circuitOutputWire.layer] && circuitLayers[circuitOutputWire.layer][circuitOutputWire.idx];
    if (!s) circuitOutputWire = null;
  }
}

function refreshCircuit() {
  if (window._curCh) renderCircuitUI(window._curCh, window._curAvail, window._curOpts);
}

function toggleGateExpand(layer, idx) {
  const gate = circuitLayers[layer] && circuitLayers[layer][idx];
  if (!gate) return;
  gate._expanded = !gate._expanded;
  refreshCircuit();
}

function gateTruthTableHtml(gate, def) {
  const n = def.inputs;
  const combos = [];
  for (let i = 0; i < (1 << n); i++) {
    const row = [];
    for (let b = 0; b < n; b++) row.push((i >> (n - 1 - b)) & 1);
    combos.push(row);
  }
  // current values at each input port (null when port is unwired)
  const cur = [];
  for (let p = 0; p < n; p++) {
    const w = gate.wires && gate.wires[p];
    if (!w) { cur.push(null); continue; }
    if (w.layer === -1) cur.push(circuitValues[circuitInputs[w.idx]] || 0);
    else {
      const src = circuitLayers[w.layer] && circuitLayers[w.layer][w.idx];
      cur.push(src ? (src._output || 0) : 0);
    }
  }
  const headers = (n === 1 ? ['A','→'] : ['A','B','→']);
  const rows = combos.map(c => {
    const out = def.fn(c);
    const active = cur.every((v, i) => v !== null && v === c[i]);
    const cells = c.map(v => `<td>${v}</td>`).join('') + `<td>${out}</td>`;
    return `<tr class="${active?'active':''}">${cells}</tr>`;
  }).join('');
  return `<table class="gate-truth"><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>${rows}</table>`;
}

// global ESC to cancel arming
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cancelArm(); });

// window resize — redraw wires (debounce not needed, cheap enough)
window.addEventListener('resize', () => drawWires());

function drawWires() {
  const svg = document.querySelector('.wire-layer');
  if (!svg) return;
  const circuit = svg.parentElement;
  const svgRect = circuit.getBoundingClientRect();
  // size svg to the full scrollable area so wires reach ports outside the visible viewport
  svg.setAttribute('width', circuit.scrollWidth);
  svg.setAttribute('height', circuit.scrollHeight);

  const sourceValue = (w) => {
    if (w.layer === -1) return !!circuitValues[circuitInputs[w.idx]];
    const g = circuitLayers[w.layer] && circuitLayers[w.layer][w.idx];
    return g ? !!g._output : false;
  };

  const wires = [];
  circuitLayers.forEach((layer, li) => {
    layer.forEach((gate, gi) => {
      if (!gate.wires) return;
      gate.wires.forEach((w, p) => {
        if (!w) return;
        wires.push({ src: w, tgt: { kind:'gate', layer: li, idx: gi, port: p }, active: sourceValue(w) });
      });
    });
  });
  if (circuitOutputWire) {
    wires.push({ src: circuitOutputWire, tgt: { kind:'output' }, active: sourceValue(circuitOutputWire) });
  }

  const paths = wires.map(({ src, tgt, active }) => {
    const srcEl = src.layer === -1
      ? document.getElementById(`port-out-input-${src.idx}`)
      : document.getElementById(`port-out-gate-${src.layer}-${src.idx}`);
    const tgtEl = tgt.kind === 'output'
      ? document.getElementById('port-in-output')
      : document.getElementById(`port-in-gate-${tgt.layer}-${tgt.idx}-${tgt.port}`);
    if (!srcEl || !tgtEl) return '';
    const sr = srcEl.getBoundingClientRect();
    const tr = tgtEl.getBoundingClientRect();
    const x1 = sr.left + sr.width/2 - svgRect.left + circuit.scrollLeft;
    const y1 = sr.top + sr.height/2 - svgRect.top + circuit.scrollTop;
    const x2 = tr.left + tr.width/2 - svgRect.left + circuit.scrollLeft;
    const y2 = tr.top + tr.height/2 - svgRect.top + circuit.scrollTop;
    const dx = Math.max(30, Math.abs(x2 - x1) * 0.5);
    const d = `M ${x1},${y1} C ${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
    const clickAttr = tgt.kind === 'output'
      ? `onclick="handleWireClick('output')"`
      : `onclick="handleWireClick('gate',${tgt.layer},${tgt.idx},${tgt.port})"`;
    // emit an invisible wider hit target first so thin wires are easy to click,
    // then the visible stroke on top.
    return `<path class="wire-hit" d="${d}" ${clickAttr}></path>`
         + `<path class="wire${active?' active':''}" d="${d}" ${clickAttr}><title>Kliknij aby odlaczyc</title></path>`;
  }).join('');

  svg.innerHTML = paths;
}

function handleWireClick(kind, layer, idx, port) {
  if (kind === 'output') disconnectTarget({ kind: 'output' });
  else disconnectTarget({ kind: 'gate', layer, idx, port });
}

// ════════════════════════════════════════════════════
//  CIRCUIT CHALLENGE (core builder)
// ════════════════════════════════════════════════════
function renderCircuitChallenge(ch) {
  const inputs = ch.inputs || ['A','B'];
  const numLayers = ch.layers || 0;
  const available = ch.availableGates || ['NOT','AND','OR','XOR'];

  // init circuit state
  circuitInputs = inputs;
  circuitValues = {};
  inputs.forEach(name => circuitValues[name] = ch.startValues ? (ch.startValues[name] || 0) : 0);
  circuitLayers = [];
  for (let i = 0; i < Math.max(numLayers, 1); i++) circuitLayers.push([]);
  circuitOutputs = [];
  circuitOutputWire = null;
  armedPort = null;

  renderCircuitUI(ch, available);
  showView('challenge');
}

// Gate is "used" if something downstream consumes its output (another gate or the output bulb).
function usedGateKeys() {
  const used = new Set();
  circuitLayers.forEach(layer => {
    layer.forEach(gate => {
      (gate.wires || []).forEach(w => {
        if (w && w.layer >= 0) used.add(`${w.layer}-${w.idx}`);
      });
    });
  });
  if (circuitOutputWire) used.add(`${circuitOutputWire.layer}-${circuitOutputWire.idx}`);
  return used;
}

function handlePortClick(target, ev) {
  if (ev) ev.stopPropagation();
  if (armedPort) {
    if (isValidTarget(target)) connectTarget(target);
    return;
  }
  // no source armed — clicking an occupied input disconnects it
  if (target.kind === 'output') {
    if (circuitOutputWire) disconnectTarget(target);
    return;
  }
  const gate = circuitLayers[target.layer] && circuitLayers[target.layer][target.idx];
  if (gate && gate.wires && gate.wires[target.port]) disconnectTarget(target);
}

function renderCircuitUI(ch, available, opts) {
  opts = opts || {};
  const hidePalette = !!opts.hidePalette;
  const hideRemove = !!opts.hideRemove;
  const hideDrop = !!opts.hideDrop;
  const lockInputs = !!opts.lockInputs;
  const el = document.getElementById(ch.type === 'sandbox' ? 'sandbox-view' : 'challenge-view');
  evaluateCircuit();

  const banner = armedPort
    ? `<div class="wire-banner">Wybierz wejscie bramki lub lampki zeby polaczyc<button onclick="cancelArm()" title="Anuluj (Esc)">✕</button></div>`
    : '';

  // inputs column — each switch also has an output port
  let inputsHtml = circuitInputs.map((name, i) => {
    const isArmedSrc = armedPort && armedPort.kind === 'input' && armedPort.idx === i;
    const switchClick = lockInputs
      ? ''
      : `onclick="circuitValues['${name}']=circuitValues['${name}']?0:1;refreshCircuit();"`;
    return `<div class="input-switch ${circuitValues[name]?'on':''}" ${lockInputs ? 'style="cursor:default;opacity:.85;"' : switchClick}>
      <div class="sw-label">${name}</div>
      <div class="sw-bulb">${circuitValues[name]?'💡':'⚫'}</div>
      <div class="sw-val">${circuitValues[name]}</div>
      <div id="port-out-input-${i}" class="port port-out${isArmedSrc?' armed':''}" title="Kliknij zeby polaczyc z bramka" onclick="event.stopPropagation(); armPort('input',-1,${i});"></div>
    </div>`;
  }).join('');

  // layer columns — each gate has ports
  const usedKeys = usedGateKeys();
  let layersHtml = '';
  circuitLayers.forEach((layer, li) => {
    let gatesHtml = '';
    layer.forEach((gate, gi) => {
      const def = GATE_DEFS[gate.type];
      if (!def) return;
      const val = gate._output;
      const isArmedSrc = armedPort && armedPort.kind === 'gate' && armedPort.layer === li && armedPort.idx === gi;
      const isUsed = usedKeys.has(`${li}-${gi}`);

      // input ports
      let portsHtml = '';
      for (let p = 0; p < def.inputs; p++) {
        const occupied = !!(gate.wires && gate.wires[p]);
        const target = { kind:'gate', layer: li, idx: gi, port: p };
        let cls = '';
        if (armedPort) cls = isValidTarget(target) ? 'valid' : 'invalid';
        else if (occupied) cls = 'occupied';
        else if (isUsed) cls = 'missing'; // gate feeds something downstream but this input is empty
        const pCls = def.inputs > 1 ? `p${p}` : '';
        portsHtml += `<div id="port-in-gate-${li}-${gi}-${p}" class="port port-in ${pCls} ${cls}" onclick="handlePortClick({kind:'gate',layer:${li},idx:${gi},port:${p}},event)"></div>`;
      }
      // output port
      portsHtml += `<div id="port-out-gate-${li}-${gi}" class="port port-out${isArmedSrc?' armed':''}" onclick="event.stopPropagation(); armPort('gate',${li},${gi});"></div>`;

      const expanded = !!gate._expanded;
      const truthHtml = expanded ? gateTruthTableHtml(gate, def) : '';
      const chevronHtml = `<button class="gate-chevron" onclick="event.stopPropagation(); toggleGateExpand(${li},${gi});">${expanded?'⌃ schowaj':'⌄ tabelka'}</button>`;

      gatesHtml += `<div class="gate-box ${def.cls}" data-inputs="${def.inputs}">
        ${hideRemove ? '' : `<button class="gate-rm" onclick="circuitLayers[${li}].splice(${gi},1);pruneWires();refreshCircuit();">✕</button>`}
        <div class="gate-label">${def.icon} ${def.label}</div>
        <div class="gate-output ${val?'gate-output-on':'gate-output-off'}">${val}</div>
        ${truthHtml}
        ${chevronHtml}
        ${portsHtml}
      </div>`;
    });

    if (!hideDrop) {
      gatesHtml += `<div class="gate-drop" data-layer="${li}"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="onGateDrop(event,${li})">+ dodaj bramke</div>`;
    }

    layersHtml += `<div class="circuit-arrow">→</div>
      <div class="circuit-col">
        <div class="circuit-col-header">Warstwa ${li+1}</div>
        <div class="circuit-col-body">${gatesHtml}</div>
      </div>`;
  });

  // output bulb — has an input port
  const finalOutput = getFinalOutput();
  let outBulbCls = '';
  if (armedPort) outBulbCls = isValidTarget({kind:'output'}) ? 'valid' : 'invalid';
  else if (circuitOutputWire) outBulbCls = 'occupied';
  else outBulbCls = 'missing'; // no wire to the bulb — always a problem
  let outputHtml = `<div class="output-bulb ${finalOutput?'on':''}">
    <div id="port-in-output" class="port port-in ${outBulbCls}" onclick="handlePortClick({kind:'output'},event)"></div>
    <div class="bulb-icon">${finalOutput?'💡':'⚫'}</div>
    <div class="bulb-val">${finalOutput}</div>
  </div>`;

  // palette
  let paletteHtml = '<h3>Bramki</h3>';
  (available.length > 0 ? [...new Set(available)] : Object.keys(GATE_DEFS)).forEach(type => {
    const def = GATE_DEFS[type];
    const usedCount = circuitLayers.flat().filter(g => g.type === type).length;
    const maxCount = available.filter(a => a === type).length;
    const canAdd = available.length === 0 || usedCount < maxCount;
    if (!canAdd) return;
    paletteHtml += `<div class="gate-pal-item ${def.cls}" draggable="true"
      ondragstart="event.dataTransfer.setData('gate-type','${type}')"
      onclick="addGateToFirstEmpty('${type}')">${def.icon} ${def.label}</div>`;
  });

  const isMultiInput = ch.type === 'multi-input';

  el.innerHTML = `
    ${banner}
    <div class="challenge-header">
      <button class="ch-back" onclick="${ch.type==='sandbox' ? "showView('tree')" : `openTopic('${currentTopic.id}')`}">← Powrot</button>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-goal">${ch.goal}</div>
    </div>
    <div class="challenge-body">
      <div class="circuit">
        <svg class="wire-layer" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="circuit-col">
          <div class="circuit-col-header">Wejscia</div>
          <div class="circuit-col-body">${inputsHtml}</div>
        </div>
        ${isMultiInput ? '' : layersHtml}
        ${isMultiInput ? '' : `<div class="circuit-arrow">→</div>
        <div class="circuit-col">
          <div class="circuit-col-header">Wyjscie</div>
          <div class="circuit-col-body">${outputHtml}</div>
        </div>`}
      </div>
      ${isMultiInput || hidePalette ? '' : `<div class="gate-palette">${paletteHtml}</div>`}
    </div>
    <div class="challenge-controls">
      <button class="btn btn-check" onclick="checkCircuitChallenge()">Sprawdz ✓</button>
      ${hideDrop ? '' : `<button class="btn btn-reset" onclick="circuitLayers.forEach(l=>l.length=0);circuitOutputWire=null;armedPort=null;refreshCircuit();">🗑 Reset</button>`}
      <button class="btn btn-hint" onclick="showTaskModal()">📋 Zadanie</button>
        <button class="btn btn-hint" onclick="alert(window._curCh.hint||'')">💡 Podpowiedz</button>
      <div class="challenge-msg" id="ch-msg"></div>
    </div>`;

  window._curCh = ch;
  window._curAvail = available;
  window._curOpts = opts;
  drawWires();
}

function addGateToFirstEmpty(type) {
  for (let i = 0; i < circuitLayers.length; i++) {
    if (circuitLayers[i].length < 4) {
      circuitLayers[i].push({ type, wires: [] });
      renderCircuitUI(window._curCh, window._curAvail, window._curOpts);
      return;
    }
  }
}

function onGateDrop(ev, layerIdx) {
  ev.preventDefault();
  ev.target.classList.remove('drag-over');
  const type = ev.dataTransfer.getData('gate-type');
  if (!type || !GATE_DEFS[type]) return;

  // check available count
  const avail = window._curAvail || [];
  if (avail.length > 0) {
    const usedCount = circuitLayers.flat().filter(g => g.type === type).length;
    const maxCount = avail.filter(a => a === type).length;
    if (usedCount >= maxCount) return;
  }

  circuitLayers[layerIdx].push({ type, wires: [] });
  renderCircuitUI(window._curCh, window._curAvail, window._curOpts);
}

function evaluateCircuit() {
  circuitLayers.forEach((layer, li) => {
    layer.forEach(gate => {
      const def = GATE_DEFS[gate.type];
      if (!def) { gate._output = 0; return; } // unknown type (e.g. '?' slot)
      const inputVals = (gate.wires || []).map(w => {
        if (!w) return 0;
        if (w.layer === -1) return circuitValues[circuitInputs[w.idx]] || 0;
        const src = circuitLayers[w.layer] && circuitLayers[w.layer][w.idx];
        return src ? (src._output || 0) : 0;
      });
      // pad missing inputs with 0
      while (inputVals.length < def.inputs) inputVals.push(0);
      gate._output = def.fn(inputVals);
    });
  });
}

function getFinalOutput() {
  if (!circuitOutputWire) return 0;
  const src = circuitLayers[circuitOutputWire.layer] && circuitLayers[circuitOutputWire.layer][circuitOutputWire.idx];
  return src ? (src._output || 0) : 0;
}

function checkCircuitChallenge() {
  const ch = window._curCh;
  if (!ch) return;

  if (ch.type === 'sandbox') {
    // sandbox challenges are exploration — clicking Sprawdz just marks it done
    showSuccess(3);
    return;
  }

  if (ch.type === 'multi-input') {
    // check if all input values match target
    const target = ch.targetValues || {};
    const correct = Object.keys(target).every(k => circuitValues[k] === target[k]);
    if (correct) showSuccess(3);
    else {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Nie pasuje — sprawdz przelaczniki!';
    }
    return;
  }

  if (ch.targetFn) {
    // kid-kind nudge: output bulb unwired is the likeliest first mistake
    if (!circuitOutputWire && ch.type !== 'multi-input') {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Polacz bramke z lampka!';
      return;
    }
    // test all combinations
    const inputs = ch.inputs || ['A','B'];
    const combos = [];
    const n = inputs.length;
    for (let i = 0; i < (1 << n); i++) {
      const combo = {};
      inputs.forEach((name, bit) => combo[name] = (i >> (n - 1 - bit)) & 1);
      combos.push(combo);
    }

    let allCorrect = true;
    for (const combo of combos) {
      // set inputs
      inputs.forEach(name => circuitValues[name] = combo[name]);
      evaluateCircuit();
      const got = getFinalOutput();
      const expected = ch.targetFn(combo);
      if (got !== expected) { allCorrect = false; break; }
    }

    // restore original values
    inputs.forEach(name => circuitValues[name] = (ch.startValues && ch.startValues[name]) || 0);
    evaluateCircuit();

    if (allCorrect) {
      const gateCount = circuitLayers.flat().length;
      // 3 stars when within the gate limit (or no limit); 2 stars if it works but exceeds limit.
      const stars = (!ch.maxGates || gateCount <= ch.maxGates) ? 3 : 2;
      showSuccess(stars);
    } else {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Nie dla wszystkich kombinacji — sprawdz polaczenia!';
      renderCircuitUI(ch, window._curAvail, window._curOpts);
    }
    return;
  }
}

// ════════════════════════════════════════════════════
//  PRESET LOADER
// ════════════════════════════════════════════════════
function loadPreset(preset) {
  circuitLayers = (preset && preset.layers ? preset.layers : []).map(layer =>
    layer.map(g => ({ type: g.type, wires: (g.wires || []).map(w => w ? {...w} : null) }))
  );
  if (circuitLayers.length === 0) circuitLayers = [[]];
  armedPort = null;
  // Seed output wire: explicit spec wins, else heuristic (last gate in last non-empty layer).
  if (preset && preset.outputWire) {
    circuitOutputWire = { ...preset.outputWire };
  } else {
    circuitOutputWire = null;
    for (let i = circuitLayers.length - 1; i >= 0; i--) {
      if (circuitLayers[i].length > 0) {
        circuitOutputWire = { layer: i, idx: circuitLayers[i].length - 1 };
        break;
      }
    }
  }
}

// ════════════════════════════════════════════════════
//  WIRE CHALLENGE (gates pre-placed, kid only wires)
// ════════════════════════════════════════════════════
function renderWireChallenge(ch) {
  const inputs = ch.inputs || ['A','B'];
  circuitInputs = inputs;
  circuitValues = {};
  inputs.forEach(name => circuitValues[name] = ch.startValues ? (ch.startValues[name] || 0) : 0);
  loadPreset(ch.preset);
  showView('challenge');
  renderCircuitUI(ch, [], { hidePalette: true, hideRemove: true, hideDrop: true });
}

// ════════════════════════════════════════════════════
//  PREDICT CHALLENGE (read the circuit, fill truth table)
// ════════════════════════════════════════════════════
function renderPredictChallenge(ch) {
  const inputs = ch.inputs || ['A','B'];
  circuitInputs = inputs;
  circuitValues = {};
  inputs.forEach(name => circuitValues[name] = 0);
  loadPreset(ch.preset);

  const numCombos = 1 << inputs.length;
  const answers = new Array(numCombos).fill(null);

  function render() {
    const el = document.getElementById('challenge-view');
    evaluateCircuit();

    let inputsHtml = inputs.map(name =>
      `<div class="input-switch ${circuitValues[name]?'on':''}" onclick="circuitValues['${name}']=circuitValues['${name}']?0:1;window._predictRender();">
        <div class="sw-label">${name}</div>
        <div class="sw-bulb">${circuitValues[name]?'💡':'⚫'}</div>
        <div class="sw-val">${circuitValues[name]}</div>
      </div>`
    ).join('');

    let layersHtml = '';
    circuitLayers.forEach((layer, li) => {
      let gatesHtml = '';
      layer.forEach(gate => {
        const def = GATE_DEFS[gate.type];
        if (!def) return;
        const val = gate._output;
        gatesHtml += `<div class="gate-box ${def.cls}">
          <div class="gate-label">${def.icon} ${def.label}</div>
          <div class="gate-output ${val?'gate-output-on':'gate-output-off'}">${val}</div>
        </div>`;
      });
      layersHtml += `<div class="circuit-arrow">→</div>
        <div class="circuit-col">
          <div class="circuit-col-header">Warstwa ${li+1}</div>
          <div class="circuit-col-body">${gatesHtml}</div>
        </div>`;
    });

    const finalOutput = getFinalOutput();
    let outputHtml = `<div class="output-bulb ${finalOutput?'on':''}">
      <div class="bulb-icon">${finalOutput?'💡':'⚫'}</div>
      <div class="bulb-val">${finalOutput}</div>
    </div>`;

    const header = inputs.map(n => `<th>${n}</th>`).join('') + '<th>wynik</th>';
    let rows = '';
    for (let i = 0; i < numCombos; i++) {
      const combo = [];
      for (let b = 0; b < inputs.length; b++) combo.push((i >> (inputs.length - 1 - b)) & 1);
      const cells = combo.map(v => `<td class="${v?'on':'off'}">${v}</td>`).join('');
      const a = answers[i];
      const btnVal = a === null ? '?' : a;
      rows += `<tr>${cells}<td><button class="btn btn-reset" style="min-width:44px;padding:4px 12px;" onclick="window._predictToggle(${i})">${btnVal}</button></td></tr>`;
    }

    el.innerHTML = `
      <div class="challenge-header">
        <button class="ch-back" onclick="openTopic('${currentTopic.id}')">← Powrot</button>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-goal">${ch.goal}</div>
      </div>
      <div class="challenge-body" style="flex-direction:column;overflow-y:auto;">
        <div class="circuit" style="flex:0 0 auto;">
          <div class="circuit-col">
            <div class="circuit-col-header">Wejscia</div>
            <div class="circuit-col-body">${inputsHtml}</div>
          </div>
          ${layersHtml}
          <div class="circuit-arrow">→</div>
          <div class="circuit-col">
            <div class="circuit-col-header">Wyjscie</div>
            <div class="circuit-col-body">${outputHtml}</div>
          </div>
        </div>
        <div style="padding:16px 24px;text-align:center;">
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Pobaw sie przelacznikami, potem wypelnij tabele:</div>
          <table class="truth-table" style="margin:0 auto;">
            <tr>${header}</tr>
            ${rows}
          </table>
        </div>
      </div>
      <div class="challenge-controls">
        <button class="btn btn-check" onclick="window._predictCheck()">Sprawdz ✓</button>
        <button class="btn btn-hint" onclick="showTaskModal()">📋 Zadanie</button>
        <button class="btn btn-hint" onclick="alert(window._predictCh.hint||'')">💡 Podpowiedz</button>
        <div class="challenge-msg" id="ch-msg"></div>
      </div>`;
  }

  window._predictCh = ch;
  window._predictRender = render;
  window._predictToggle = (i) => {
    const a = answers[i];
    if (a === null) answers[i] = 0;
    else if (a === 0) answers[i] = 1;
    else answers[i] = null;
    render();
  };
  window._predictCheck = () => {
    if (answers.some(a => a === null)) {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Wypelnij wszystkie pola!';
      return;
    }
    let allCorrect = true;
    for (let i = 0; i < numCombos; i++) {
      const combo = {};
      inputs.forEach((name, bit) => combo[name] = (i >> (inputs.length - 1 - bit)) & 1);
      inputs.forEach(name => circuitValues[name] = combo[name]);
      evaluateCircuit();
      if (getFinalOutput() !== answers[i]) { allCorrect = false; break; }
    }
    inputs.forEach(name => circuitValues[name] = 0);
    evaluateCircuit();
    if (allCorrect) showSuccess(3);
    else {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Cos sie nie zgadza — pobaw sie przelacznikami i sprawdz znowu!';
      render();
    }
  };

  showView('challenge');
  render();
}

// ════════════════════════════════════════════════════
//  FILL CHALLENGE (pick the missing gate)
// ════════════════════════════════════════════════════
function renderFillChallenge(ch) {
  const inputs = ch.inputs || ['A','B'];
  circuitInputs = inputs;
  circuitValues = {};
  inputs.forEach(name => circuitValues[name] = 0);
  loadPreset(ch.preset);

  let slotLoc = null;
  circuitLayers.forEach((layer, li) => {
    layer.forEach((g, gi) => { if (g.type === '?') slotLoc = { li, gi }; });
  });
  let picked = null;

  function render() {
    const el = document.getElementById('challenge-view');
    evaluateCircuit();

    let inputsHtml = circuitInputs.map(name =>
      `<div class="input-switch ${circuitValues[name]?'on':''}" onclick="circuitValues['${name}']=circuitValues['${name}']?0:1;window._fillRender();">
        <div class="sw-label">${name}</div>
        <div class="sw-bulb">${circuitValues[name]?'💡':'⚫'}</div>
        <div class="sw-val">${circuitValues[name]}</div>
      </div>`
    ).join('');

    let layersHtml = '';
    circuitLayers.forEach((layer, li) => {
      let gatesHtml = '';
      layer.forEach((gate, gi) => {
        const isSlot = slotLoc && li === slotLoc.li && gi === slotLoc.gi;
        const def = GATE_DEFS[gate.type];
        const val = gate._output;
        if (isSlot && !def) {
          gatesHtml += `<div class="gate-box" style="border-style:dashed;border-color:var(--cyan);">
            <div class="gate-label" style="color:var(--cyan);">❓ ?</div>
            <div class="gate-output gate-output-off">0</div>
          </div>`;
        } else if (def) {
          gatesHtml += `<div class="gate-box ${def.cls}" ${isSlot?'style="outline:2px solid var(--cyan);"':''}>
            <div class="gate-label">${def.icon} ${def.label}</div>
            <div class="gate-output ${val?'gate-output-on':'gate-output-off'}">${val}</div>
          </div>`;
        }
      });
      layersHtml += `<div class="circuit-arrow">→</div>
        <div class="circuit-col">
          <div class="circuit-col-header">Warstwa ${li+1}</div>
          <div class="circuit-col-body">${gatesHtml}</div>
        </div>`;
    });

    const finalOutput = getFinalOutput();
    let outputHtml = `<div class="output-bulb ${finalOutput?'on':''}">
      <div class="bulb-icon">${finalOutput?'💡':'⚫'}</div>
      <div class="bulb-val">${finalOutput}</div>
    </div>`;

    let pickerHtml = ch.options.map(opt => {
      const def = GATE_DEFS[opt];
      return `<div class="gate-pal-item ${def.cls}" onclick="window._fillPick('${opt}')" style="${picked===opt ? 'outline:2px solid var(--cyan);' : ''}">${def.icon} ${def.label}</div>`;
    }).join('');

    el.innerHTML = `
      <div class="challenge-header">
        <button class="ch-back" onclick="openTopic('${currentTopic.id}')">← Powrot</button>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-goal">${ch.goal}</div>
      </div>
      <div class="challenge-body">
        <div class="circuit">
          <div class="circuit-col">
            <div class="circuit-col-header">Wejscia</div>
            <div class="circuit-col-body">${inputsHtml}</div>
          </div>
          ${layersHtml}
          <div class="circuit-arrow">→</div>
          <div class="circuit-col">
            <div class="circuit-col-header">Wyjscie</div>
            <div class="circuit-col-body">${outputHtml}</div>
          </div>
        </div>
        <div class="gate-palette">
          <h3>Wybierz bramke</h3>
          ${pickerHtml}
        </div>
      </div>
      <div class="challenge-controls">
        <button class="btn btn-check" onclick="window._fillCheck()">Sprawdz ✓</button>
        <button class="btn btn-hint" onclick="showTaskModal()">📋 Zadanie</button>
        <button class="btn btn-hint" onclick="alert(window._fillCh.hint||'')">💡 Podpowiedz</button>
        <div class="challenge-msg" id="ch-msg"></div>
      </div>`;
  }

  window._fillCh = ch;
  window._fillRender = render;
  window._fillPick = (opt) => {
    picked = opt;
    if (slotLoc) circuitLayers[slotLoc.li][slotLoc.gi].type = opt;
    render();
  };
  window._fillCheck = () => {
    if (!picked) {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Wybierz bramke!';
      return;
    }
    if (picked === ch.answer) showSuccess(3);
    else {
      document.getElementById('ch-msg').className = 'challenge-msg fail';
      document.getElementById('ch-msg').textContent = 'Nie ta bramka — pobaw sie przelacznikami i sprobuj inna.';
    }
  };

  showView('challenge');
  render();
}

// ════════════════════════════════════════════════════
//  SANDBOX
// ════════════════════════════════════════════════════
function openSandbox() {
  const ch = {
    title: 'Sandbox',
    goal: 'Buduj dowolne uklady logiczne!',
    type: 'sandbox',
    inputs: ['A', 'B', 'C'],
    layers: 3,
    availableGates: [],
    hint: 'Eksperymentuj! Dodaj bramki i polacz je.',
  };
  currentTopic = { id: '_sandbox', challenges: [ch] };
  currentChallengeIdx = 0;
  currentChallenge = ch;

  circuitInputs = ch.inputs;
  circuitValues = { A: 0, B: 0, C: 0 };
  circuitLayers = [[], [], []];
  circuitOutputWire = null;
  armedPort = null;

  renderCircuitUI(ch, []);
}
